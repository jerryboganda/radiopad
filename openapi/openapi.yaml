  /api/billing/refund:
    post:
      summary: |
        PRD BILL-007 — issue a refund against a tenant payment. RBAC-gated
        (`BillingAdmin` / `ItAdmin`). Validates amount/reason locally and
        verifies the PaymentIntent belongs to the current tenant before issuing
        the refund. Carries a deterministic `Idempotency-Key`; audited as
