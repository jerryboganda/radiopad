              schema: { $ref: "#/components/schemas/Problem" }

  /api/providers/{id}/health:
    post:
      summary: Iter-32 AI-011 — adapter-specific health probe. Targets `/api/tags` for Ollama, `/v1/models` for vLLM, `/health` for llama.cpp; other adapters return `{ok:true,note:"no-op"}`. ItAdmin / MedicalDirector only.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200":
          description: Probe completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  error: { type: string, nullable: true }
                  note: { type: string, nullable: true }

  /api/providers/{id}/oauth/refresh-token:
    post:
      summary: Iter-35 PROV-007 — save (or replace) the per-provider OAuth refresh token in the encrypted vault. ItAdmin / BillingAdmin only. Audited as `OAuthRefreshRotated` with `kind:"saved"`; never returns or logs ciphertext.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string, description: "Plaintext OAuth refresh token; encrypted server-side and never echoed back." }
                expiresAt: { type: string, format: date-time, nullable: true }
                rotationPolicy:
                  type: string
                  nullable: true
                  enum: [never, before_expiry, every_24h]
      responses:
        "204": { description: Token saved. }
        "403":
          description: RBAC failure — caller is not ItAdmin / BillingAdmin.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404": { description: Provider not found in the active tenant. }
        "503":
          description: KMS unavailable — tenant has no `CmkKeyRef` and `RADIOPAD_TENANT_KEK_DEFAULT` is unset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  kind: { type: string, enum: [kms_unavailable] }
    delete:
      summary: Iter-35 PROV-007 — delete the stored OAuth refresh token. Clears all ciphertext columns; rotation policy is preserved. ItAdmin / BillingAdmin only. Audited as `OAuthRefreshRotated` with `kind:"deleted"`.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        "204": { description: Token deleted. }
        "403": { description: RBAC failure. }
        "404": { description: Provider not found. }

  /api/providers/{id}/oauth/refresh-token/status:
    get:
      summary: Iter-35 PROV-007 — non-secret status of the refresh-token vault. NEVER returns ciphertext, IV, tag, or wrapped DEK. ItAdmin / BillingAdmin only.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200":
          description: Token status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasToken: { type: boolean }
                  updatedAt: { type: string, format: date-time, nullable: true }
                  expiresAt: { type: string, format: date-time, nullable: true }
                  rotationPolicy:
                    type: string
                    enum: [never, before_expiry, every_24h]
        "403": { description: RBAC failure. }
        "404": { description: Provider not found. }

  /api/ai/routing/preview:
    get:
      summary: Iter-32 AI-010 — explain the gateway's composite routing decision for a hypothetical request without performing a real AI call. ItAdmin / MedicalDirector only.
      parameters:
        - in: query
          name: phi
          required: false
          schema: { type: boolean, default: false }
        - in: query
          name: modality
          required: false
          schema: { type: string }
        - in: query
          name: input
          required: false
          schema: { type: integer, minimum: 0 }
        - in: query
          name: output
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Routing decision + per-candidate score breakdown.
          content:
            application/json:
              schema:
                type: object
                properties:
                  selectedProviderId: { type: string, format: uuid, nullable: true }
                  selectedProviderName: { type: string, nullable: true }
                  reason: { type: string, nullable: true }
                  weights:
                    type: object
                    properties:
                      cost: { type: number }
                      quality: { type: number }
                      latency: { type: number }
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        providerId: { type: string, format: uuid }
                        name: { type: string }
                        adapter: { type: string }
                        compliance: { type: string }
                        eligible: { type: boolean }
                        ineligibleReason: { type: string, nullable: true }
                        costUsdEstimate: { type: number }
                        costScore: { type: number }
                        qualityScore: { type: number }
                        latencyScore: { type: number }
                        p95LatencyMs24h: { type: integer, nullable: true }
