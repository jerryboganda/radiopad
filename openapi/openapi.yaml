                hallucinationSeverity: { type: string, enum: [Info, Warning, Blocker] }
                hallucinationAllowList: { type: string }
                hallucinationMinSupport: { type: number, format: double, minimum: 0, maximum: 1 }
                plan: { type: integer, enum: [0, 1, 2] }
                featureFlagsJson: { type: string }
      responses:
        "200": { description: Saved }
        "403":
