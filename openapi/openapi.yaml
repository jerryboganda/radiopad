                  status: { type: string, description: "`succeeded`, `pending`, `failed`, `canceled`." }
                  amount: { type: integer }
        "400":
          description: Validation error (kind=validation)
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
        "403":
          description: Caller role not permitted (kind=forbidden)
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
        "409":
          description: Tenant has no Stripe customer to validate refund ownership.
        "503":
          description: Stripe not configured (`RADIOPAD_STRIPE_SECRET_KEY` missing).

  /api/marketplace/webhook:
    post:
      summary: |
        Stripe marketplace webhook receiver. Requires
        `RADIOPAD_STRIPE_WEBHOOK_SECRET` outside the `Testing` environment;
        test hosts may use unsigned fixtures. Events are deduplicated by
        `(Source, EventId)` and checkout-session events are ignored unless the
        session metadata identifies `radiopadFlow=marketplace`.
      responses:
        "200": { description: Event accepted (or duplicate). }
        "400": { description: Invalid signature or malformed event. }
        "503": { description: Webhook secret missing outside Testing. }

  /api/marketplace/listings:
    get:
      summary: Public approved marketplace catalogue. Does not return artifact bodies.
      parameters:
        - in: query
          name: kind
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MarketplaceListingSummary" }

  /api/marketplace/listings/{id}:
    get:
      summary: Public approved marketplace listing detail. Does not return artifact bodies.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketplaceListingSummary" }
        "404": { description: Listing not found or not approved. }

  /api/marketplace/connect/status:
    get:
      summary: |
        PRD MKT-006 — Stripe Connect onboarding state for the active tenant
        (the publisher). When `chargesEnabled` is false, buyer checkout
        against any of this tenant's listings returns 409
        `kind:"connect_not_ready"`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketplaceConnectStatus" }
        "503":
          description: Stripe not configured (`RADIOPAD_STRIPE_SECRET_KEY` missing).

  /api/marketplace/purchases/{id}/refund:
    post:
      summary: |
        PRD MKT-006 — refund a marketplace purchase. RBAC-gated
        (`MedicalDirector` / `ItAdmin`). Reverses both the platform fee and
        the publisher transfer. Idempotency-Key on every Stripe call;
        audited as `BillingChanged` with PII hashed.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  nullable: true
                  enum: [duplicate, fraudulent, requested_by_customer]
      responses:
        "200":
          description: Refund created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string }
        "403":
          description: Caller role not permitted (kind=forbidden)
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
        "404":
          description: Purchase not found in this tenant.
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
        "409":
          description: Purchase not in a refundable state (kind=conflict).
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }

  /api/ingest/order:
    post:
      summary: |
        PRD INT-001..004 — inbound HL7/FHIR order webhook. Authenticates with
        `X-RadioPad-Tenant: <slug>` + `Authorization: Bearer <secret>`; the
        bearer is compared in constant time to
        `TenantSettings.IngestBearerSecret`. Idempotent on `accessionNumber`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessionNumber, modality, bodyPart]
              properties:
                accessionNumber: { type: string }
                modality: { type: string }
                bodyPart: { type: string }
                indication: { type: string }
                comparison: { type: string }
                patientRef: { type: string }
                rulebookId: { type: string, format: uuid }
      responses:
        "200":
          description: OK (id of the created or deduplicated draft).
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  deduplicated: { type: boolean }
        "401":
          description: Missing/unknown tenant or invalid bearer.
        "503":
          description: Ingest not configured for this tenant.

  /api/reports/{id}/dicom-context:
    get:
      summary: |
        PRD DCM-001..006 — fetch DICOMweb study context for the report's
        accession number using the tenant-configured PACS. Always returns 200;
        `study` is null when DICOMweb is not configured or the study is not
        found. Audited as `DicomContextFetched`.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  study:
                    nullable: true
                    type: object
                    properties:
                      studyInstanceUid: { type: string }
                      modality: { type: string }
                      bodyPart: { type: string }
                      studyDate: { type: string }
                      instanceCount: { type: integer }
                      sourceUrl: { type: string }

  /api/reports/{id}/dicom-context/instance:
    get:
      summary: |
        PRD STD-004 / iter-31 — WADO-RS instance metadata (DICOM JSON Model)
        for a specific (study, series, instance) tuple. Returns 200 with
        `configured: false` when DICOMweb is not configured. Audited as
        `DicomContextFetched` with `details.scope = "instance"`.
      parameters:
        - { in: header, name: X-RadioPad-Tenant, required: true, schema: { type: string } }
        - { in: header, name: X-RadioPad-User, required: true, schema: { type: string } }
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: studyUid, required: true, schema: { type: string } }
        - { in: query, name: seriesUid, required: true, schema: { type: string } }
        - { in: query, name: instanceUid, required: true, schema: { type: string } }
      responses:
        "200":
          description: Either the parsed metadata array or a configured-false stub.
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  metadata:
                    description: DICOM JSON Model array, or null when not configured / not found.
                    nullable: true
                    type: array
                    items: { type: object, additionalProperties: true }
        "400": { description: Missing studyUid / seriesUid / instanceUid. }
        "401": { description: Missing tenant / user header. }
        "403": { description: Caller role is not Radiologist / MedicalDirector / ReportingAdmin. }
        "404": { description: Report not found in tenant. }

  /api/reports/{id}/compare-prior:
    get:
      summary: |
        PRD RPT-009 / iter-31 — side-by-side section diff between the
        current report and the most recent prior report for the same body
        part within the tenant. `prior` is null when no prior exists.
        Each `sections[i].changed` is true when the trimmed section bodies
        differ.
      parameters:
        - { in: header, name: X-RadioPad-Tenant, required: true, schema: { type: string } }
        - { in: header, name: X-RadioPad-User, required: true, schema: { type: string } }
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  current:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      bodyPart: { type: string }
                  prior:
                    nullable: true
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      bodyPart: { type: string }
                      createdAt: { type: string, format: date-time }
                  sections:
                    type: array
                    items:
                      type: object
                      properties:
                        section: { type: string }
                        current: { type: string }
                        prior: { type: string }
                        changed: { type: boolean }

  /api/ingest/fhir/servicerequest:
    post:
      summary: |
        PRD INT-002 — accept a FHIR R4 `ServiceRequest` resource (or a
        `Bundle` containing one) and translate it into the same Draft report
        as `/api/ingest/order`. Same authentication. Accession is taken from
        `identifier[0].value`; modality from `code.coding[0].display` or
        `category[0].text`; body part from `bodySite[0].text` or
        `bodySite[0].coding[0].display`. Idempotent on accession.
      parameters:
        - in: header
          name: X-RadioPad-Signature
          required: false
          description: |
            Iter-31 INT-005 — HMAC-SHA256 of the raw body, hex-encoded,
            prefixed with `sha256=`. Required only when the tenant has set
            `FhirWebhookSecret`. When set, both this signature AND the bearer
            must validate; mismatches return 401 and audit `PolicyViolation`
            with reason `fhir-webhook:bad_signature`.
          schema: { type: string, pattern: "^sha256=[0-9a-f]{64}$" }
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
              description: FHIR R4 ServiceRequest or Bundle.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  deduplicated: { type: boolean }
        "400": { description: Missing accession or modality. }
        "401": { description: Missing/unknown tenant, invalid bearer, or invalid `X-RadioPad-Signature` when `FhirWebhookSecret` is configured. }
        "503": { description: Ingest not configured. }

  /api/auth/signin:
    post:
      summary: |
        PRD AUTH-001 (dev tier) — exchange a tenant slug + user email for an
        opaque bearer token. The token is HMAC-derived from `RADIOPAD_AUTH_SECRET`
        + tenant + user, audited as `UserLogin`, and intended for storage in
        the OS-level secure store on native shells. Replacement OIDC pipeline
        is tracked under ADR-0004.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant, user]
              properties:
                tenant: { type: string }
                user: { type: string, format: email }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  tenant: { type: string }
                  user: { type: string, format: email }
                  expiresAt: { type: string, format: date-time }
        "400": { description: Missing tenant/user. }
        "401": { description: Unknown tenant or user not a member. }

  /api/usage/analytics:
    get:
      summary: |
        PRD §18 — aggregated product + governance KPIs for the Analytics
        dashboard. Tenant-scoped. Default window is the last 30 days.
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  window:
                    type: object
                    properties:
                      from: { type: string, format: date-time }
                      to: { type: string, format: date-time }
                  reports:
                    type: object
                    properties:
                      total: { type: integer }
                      validated: { type: integer }
                      exported: { type: integer }
                      validationPassRate: { type: number }
                  ai:
                    type: object
                    description: Same shape as `/api/usage/summary`.
                  governance:
                    type: object
                    properties:
                      phiPolicyBlocks: { type: integer }
                      policyViolations: { type: integer }
                      rulebookApprovals: { type: integer }
                      activeUsers: { type: integer }

  /api/reports/{id}/export/hl7:
    get:
      summary: |
        PRD §19.1 / Beta — HL7 v2.5 ORU^R01 export of an acknowledged report.
        Subject to RPT-012 gating: returns 409 unless the report is at least
        `Acknowledged`. Audits `ReportExported` with `format:"hl7"`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/hl7-v2:
              schema: { type: string }
        "404": { description: Report not found in this tenant. }
        "409": { description: Report not validated yet. }

  /api/audit/siem:
    get:
      summary: |
        PRD §19 / Beta — SIEM log export. Streams the tenant audit chain in
        either NDJSON (`format=json`) or ArcSight CEF (`format=cef`) for
        ingestion into Splunk / Elastic / QRadar / Sentinel. Restricted to
        Compliance / IT / Medical Director roles. PHI minimisation: only ids,
        action codes, timestamps, and the integrity hash are emitted.
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: format
          schema: { type: string, enum: [json, cef], default: json }
        - in: query
          name: take
          schema: { type: integer, default: 5000, minimum: 1, maximum: 50000 }
      responses:
        "200":
          description: OK
          content:
            application/x-ndjson:
              schema: { type: string }
            text/plain:
              schema: { type: string }
        "400": { description: Invalid format. }
        "403": { description: Caller lacks the required role. }

  /api/admin/security/test-webhook:
    post:
      summary: |
        Sends a synthetic, non-PHI security alert payload to the configured
        security webhook (`RADIOPAD_SECURITY_WEBHOOK_URL`, falling back to
        `RADIOPAD_ANOMALY_WEBHOOK_URL`). Signs with
        `RADIOPAD_SECURITY_WEBHOOK_SECRET` when present. Restricted to IT,
        Medical Director, or Compliance Reviewer roles.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [sent, configured]
                properties:
                  sent: { type: boolean }
                  configured: { type: boolean }
                  statusCode: { type: integer, nullable: true }
        "403": { description: Caller lacks the required role. }

  /scim/v2/Users:
    get:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: |
        PRD AUTH-005 — SCIM 2.0 list users (RFC 7644). Tenant-scoped via
        `X-RadioPad-Tenant` + `Authorization: Bearer <ScimBearerSecret>`.
        Supports the minimal `userName eq "x"` filter used by Okta /
        Azure AD provisioning agents.
      parameters:
        - in: query
          name: startIndex
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: count
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: filter
          schema: { type: string }
      responses:
        "200": { description: SCIM ListResponse. }
        "401": { description: Missing tenant or invalid bearer. }
        "503": { description: SCIM not configured for this tenant. }
    post:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 create user.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema: { type: object }
      responses:
        "201": { description: Created. }
        "409": { description: User already exists. }

  /scim/v2/Users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 get user.
      responses:
        "200": { description: User resource. }
        "404": { description: Not found. }
    put:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 replace user.
      responses:
        "200": { description: Updated. }
    patch:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: |
        SCIM 2.0 patch user. Supports `replace` of `active`, `displayName`,
        and `name.formatted`. Used by Okta / Azure AD on deprovision.
      responses:
        "200": { description: Patched. }
    delete:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 delete user (soft-delete — sets active=false).
      responses:
        "204": { description: No content. }

  /scim/v2/Groups:
    get:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: |
        PRD AUTH-005 — SCIM 2.0 list groups (RFC 7644). Tenant-scoped via
        `X-RadioPad-Tenant` + `Authorization: Bearer <ScimBearerSecret>`.
        Supports the minimal `displayName eq "x"` filter used by Okta /
        Azure AD provisioning agents.
      parameters:
        - in: query
          name: startIndex
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: count
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: filter
          schema: { type: string }
      responses:
        "200": { description: SCIM ListResponse. }
        "401": { description: Missing tenant or invalid bearer. }
        "503": { description: SCIM not configured for this tenant. }
    post:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 create group and optional members.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema: { type: object }
      responses:
        "201": { description: Created. }
        "409": { description: Group already exists. }

  /scim/v2/Groups/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 get group.
      responses:
        "200": { description: Group resource. }
        "404": { description: Not found. }
    put:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 replace group and members.
      responses:
        "200": { description: Updated. }
    patch:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: |
        SCIM 2.0 patch group. Supports displayName/externalId changes,
        member add/replace/remove, and `members[value eq "<userId>"]` remove.
        Membership changes project roles through TenantSettings.ScimGroupRoleMapJson.
      responses:
        "200": { description: Patched. }
    delete:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 delete group and memberships.
      responses:
        "204": { description: No content. }

  /scim/v2/ServiceProviderConfig:
    get:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 service provider configuration discovery.
      responses:
        "200": { description: ServiceProviderConfig resource. }
        "401": { description: Missing tenant or invalid bearer. }
        "503": { description: SCIM not configured for this tenant. }

  /scim/v2/ResourceTypes:
    get:
      security:
        - TenantHeader: []
          ScimBearer: []
      summary: SCIM 2.0 resource type discovery.
      responses:
        "200": { description: ListResponse of resource types. }
        "401": { description: Missing tenant or invalid bearer. }
        "503": { description: SCIM not configured for this tenant. }

  /api/tenant/settings/kms/verify:
    post:
      summary: |
        PRD SEC-003 — verify the configured customer-managed key (CMK) by
        performing a real wrap+unwrap round-trip of a 32-byte probe.
        Stamps `cmk.lastVerifiedAt` on a successful round-trip. Restricted
        to IT / Compliance / Medical Director roles. Schemes: `env:`,
        `local:`, `aws:`, `azkv:`, `gcp:`.
      responses:
        "200":
          description: OK — round-trip succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  scheme: { type: string, enum: [env, local, aws, azkv, gcp] }
                  keyRef: { type: string }
                  lastVerifiedAt: { type: string, format: date-time }
        "400": { description: No CMK keyRef configured. }
        "403": { description: Caller lacks the required role. }
        "422":
          description: |
            KMS provider unavailable or wrap/unwrap round-trip mismatch.
            `kind` is `kms_unavailable` (provider error / missing IAM /
            malformed keyRef) or `kms_roundtrip_mismatch` (unwrap returned
            a different value than the wrapped input).
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind: { type: string, enum: [kms_unavailable, kms_roundtrip_mismatch] }
                  error: { type: string }

  /api/tenant/settings/locale:
    get:
      summary: |
        Iter-35 i18n — read the tenant default UI locale and the locked
        supported set. Affects chrome only; clinical content is never
        translated.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale: { type: string, enum: [en, es, de, fr, pt, hi] }
                  supported:
                    type: array
                    items: { type: string, enum: [en, es, de, fr, pt, hi] }
    put:
      summary: |
        Iter-35 i18n — set the tenant default UI locale. Restricted to
        ``ItAdmin`` and ``MedicalDirector``. Returns 400 ``kind:"validation"``
        when the body locale is not in the supported set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale: { type: string, enum: [en, es, de, fr, pt, hi] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale: { type: string, enum: [en, es, de, fr, pt, hi] }
        "400":
          description: Unsupported locale tag.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  kind: { type: string, enum: [validation] }
        "403": { description: Caller lacks the required role. }

  /api/users/me/locale:
    put:
      summary: |
        Iter-35 i18n — set or clear the per-user locale override on
        ``User.PreferredLocale``. Any tenant member may write their own
        override; ``null`` clears the override and the UI falls back to
        the tenant default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                locale:
                  oneOf:
                    - { type: string, enum: [en, es, de, fr, pt, hi] }
                    - { type: "null" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale:
                    oneOf:
                      - { type: string, enum: [en, es, de, fr, pt, hi] }
                      - { type: "null" }
        "400":
          description: Unsupported locale tag.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  kind: { type: string, enum: [validation] }

  /api/auth/mfa/enroll:
    post:
      summary: PRD AUTH-003 — begin TOTP enrollment. Returns base32 secret + otpauth URI.
      responses:
        "200": { description: OK }
        "404": { description: User not found. }
  /api/auth/mfa/verify:
    post:
      summary: Confirm a 6-digit TOTP code; flips `mfaEnabled = true` on the user.
      responses:
        "200": { description: OK }
        "401": { description: Invalid TOTP code. }
  /api/auth/magic-link/request:
    post:
      summary: PRD AUTH-004 — mail a single-use 15-minute sign-in link via SMTP. In dev (no SMTP env) returns the link in the response.
      responses:
        "200": { description: OK }
  /api/auth/magic-link/consume:
    post:
      summary: Exchange a magic-link token for an opaque session bearer.
      responses:
        "200": { description: OK }
        "401": { description: Invalid or expired link. }
  /api/auth/device/authorize:
    post:
      summary: PRD AUTH-007 — RFC 8628 device authorization. Returns deviceCode + userCode.
      responses:
        "200": { description: OK }
  /api/auth/device/approve:
    post:
      summary: Operator approves a userCode while signed in.
      responses:
        "200": { description: OK }
  /api/auth/device/deny:
    post:
      summary: Operator denies a userCode.
      responses:
        "200": { description: OK }
  /api/auth/device/token:
    post:
      summary: Device polls for the access token. Errors per RFC 8628 §3.5 (authorization_pending, slow_down, access_denied, expired_token).
      responses:
        "200": { description: OK }
        "400": { description: Pending or rejected per RFC 8628. }

  # --- PRD AUTH-001 / INT-002 — SAML 2.0 SP (iter-32) ---
  /saml/metadata:
    get:
      summary: SAML 2.0 Service Provider metadata document.
      responses:
        "200":
          description: SP descriptor XML (application/samlmetadata+xml).
  /saml/acs:
    post:
      summary: SAML 2.0 Assertion Consumer Service. Verifies XML signature with `RADIOPAD_SAML_IDP_CERT_PEM`, maps NameID to a RadioPad user, mints a bearer, audits `UserLogin{method:"saml"}`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse: { type: string, description: Base64-encoded SAML response XML. }
                RelayState:   { type: string }
      responses:
        "200": { description: Bearer issued. }
        "400": { description: Malformed assertion. }
        "401": { description: Signature invalid or tenant/user not found. }

  # --- PRD AUTH-001 — WebAuthn / passkeys (iter-32) ---
  /api/auth/webauthn/register-options:
    post:
      summary: Begin WebAuthn registration; returns PublicKeyCredentialCreationOptions.
      responses:
        "200": { description: OK }
  /api/auth/webauthn/register:
    post:
      summary: Complete WebAuthn registration; persists the credential under the current (tenant, user).
      responses:
        "200": { description: OK }
        "400": { description: Attestation invalid or duplicate credential. }
  /api/auth/webauthn/signin-options:
    post:
      summary: Begin WebAuthn assertion; returns PublicKeyCredentialRequestOptions.
      responses:
        "200": { description: OK }
  /api/auth/webauthn/signin:
    post:
      summary: Complete WebAuthn assertion; on success mints a bearer and audits `UserLogin{method:"webauthn"}`.
      responses:
        "200": { description: OK }
        "401": { description: Assertion invalid. }

  # --- PRD AUTH-006 — emergency lockout / session revocation (iter-32) ---
  /api/users/{id}/unlock:
    post:
      summary: Compliance / IT-Admin clears `LockedUntil` and resets the failure counter; audits `UserUnlocked`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Unlocked. }
  /api/users/{id}/revoke-sessions:
    post:
      summary: Compliance / IT-Admin increments `User.SessionEpoch`; all outstanding bearers immediately fail HMAC validation. Audits `SessionsRevoked`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Sessions revoked. }

  # --- PRD MOB-007 — mobile push device registration ---
  /api/push/devices:
    post:
      summary: Register an APNs (iOS) / FCM (Android) device token for the current (tenant, user). Idempotent on (tenant, user, token).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, platform]
              properties:
                token:
                  type: string
                  description: Native push token from the OS (APNs device token or FCM registration token).
                platform:
                  type: string
                  enum: [ios, android, web]
      responses:
        "200":
          description: Device registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  platform: { type: string }
        "400": { description: Invalid platform or missing token. }
  /api/push/devices/{token}:
    delete:
      summary: Unregister a previously-registered push token for the current (tenant, user).
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "204": { description: Removed. }
        "404": { description: No such device for this user. }
  /api/push/test:
    post:
      summary: Admin-only — send a generic "RadioPad / You have a new notification" test push to the calling user's most-recent registered device.
      responses:
        "200":
          description: Push enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent: { type: boolean }
                  deviceId: { type: string, format: uuid }
                  platform: { type: string }
        "403": { description: Caller lacks an admin role. }
        "404": { description: No registered device for this user. }
        "503":
          description: Push provider not configured.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  type: { type: string }
                  title: { type: string }
                  status: { type: integer }
                  detail: { type: string }
                  kind:
                    type: string
                    enum: [push_not_configured]

  # --- Reusable error response ---
components_responses_anchor: {}

  # --- Iter-30 — Report rewrite (RPT-007) ---
  /api/reports/{id}/rewrite:
    post:
      summary: Rewrite a report in one of four modes — concise, formal, patient_friendly, referring_summary. Audited as AiRequest. PHI policy enforced inside the gateway.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RewriteRequest'
      responses:
        '200':
          description: Rewritten text.
          content:
            application/json:
              schema:
                type: object
                properties:
                  text: { type: string }
                  provider: { type: string }
                  model: { type: string }
                  latencyMs: { type: integer }
                  promptVersion: { type: string }
                  mode: { type: string }
        '400': { description: Unknown mode. }
        '403': { description: Provider policy blocked the request (e.g. PHI to non-PHI provider). }
        '404': { description: Report not found in the calling tenant. }
        '503': { description: No enabled AI provider available. }

  # --- Iter-30 — Multi-radiologist sign-off + addendum ---
  /api/reports/{id}/sign:
    post:
      summary: Append a signature. First signature must be Primary; CoSigner / Addendum are only allowed after a Primary signature exists.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [Primary, CoSigner, Addendum] }
                note: { type: string, nullable: true }
      responses:
        '200':
          description: Signature created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSignature'
        '404': { description: Report not found. }
        '409': { description: Sign-off ordering violated (e.g. CoSigner before Primary, or duplicate Primary). }
  /api/reports/{id}/addendum:
    post:
      summary: Append an addendum body to an already-Primary-signed report. Creates a new ReportVersion with isAddendum=true.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        '200':
          description: Addendum appended.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  sequence: { type: integer }
                  isAddendum: { type: boolean }
        '400': { description: Body required. }
        '404': { description: Report not found. }
        '409': { description: Report is not yet Primary-signed. }
  /api/reports/{id}/signatures:
    get:
      summary: List signatures attached to a report, oldest first.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Signature list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportSignature'
        '404': { description: Report not found. }

  # --- Iter-30 — Standards / Terminology (STD-001 RadLex, STD-002 RADS) ---
  /api/terminology/radlex/search:
    get:
      summary: STD-001 — RadLex prefix search across the curated subset bundled with RadioPad. RadLex is a registered trademark of RSNA.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: take
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Matching concepts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RadLexConcept'
        '400': { description: q is required. }
  /api/terminology/radlex/CodeSystem:
    get:
      summary: STD-001 — minimal FHIR R4 CodeSystem fragment for the bundled RadLex subset.
      responses:
        '200':
          description: FHIR CodeSystem JSON (content=fragment).
          content:
            application/fhir+json:
              schema:
                type: object
  /api/terminology/rads:
    get:
      summary: STD-002 — ACR RADS lookup. Without ?system, returns a list of supported systems; with ?system=bi_rads etc. returns the category list. Codes + short labels only — no copyrighted prose.
      parameters:
        - in: query
          name: system
          schema: { type: string, enum: [bi_rads, li_rads, pi_rads, lung_rads, tirads, c_rads] }
      responses:
        '200':
          description: Categories or system index.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RadsSystemIndex'
                  - $ref: '#/components/schemas/RadsSystemDefinition'
        '404': { description: Unknown RADS system. }

  # --- Iter-30 — Bidirectional FHIR ingest ---
  /api/ingest/fhir/diagnosticreport:
    post:
      summary: Iter-30 — accept a FHIR R4 DiagnosticReport (or Bundle containing one) and create a draft Report keyed by tenant. basedOn[0].reference is captured as serviceRequestRef. Audited as ReportImported.
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
              description: FHIR R4 DiagnosticReport.
      responses:
        '200':
          description: Created or deduplicated draft.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  deduplicated: { type: boolean }
        '400': { description: Missing accession or unparseable JSON / not a DiagnosticReport. }
        '401': { description: Bad / missing tenant or bearer. }
        '503': { description: Tenant has no ingest secret configured. }

  # --- Iter-30 — Enterprise invoice bulk export (BILL-003) ---
  /api/billing/invoices/export:
    get:
      summary: Iter-30 — bulk export invoices as CSV (default) or ZIP (CSV + per-invoice PDFs + manifest.txt with SHA-256 hashes). RBAC BillingAdmin/ItAdmin/MedicalDirector. Audited as BillingChanged action=bulk_export.
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: format
          schema: { type: string, enum: [csv, zip], default: csv }
      responses:
        '200':
          description: Export file (text/csv or application/zip).
          content:
            text/csv: { schema: { type: string } }
            application/zip: { schema: { type: string, format: binary } }
        '403': { description: RBAC denied. }
        '503': { description: Stripe not configured or tenant missing customer. }

  # --- Iter-35 — PERF-004 synthetic availability monitor ---
  /api/admin/observability/availability:
    get:
      summary: Iter-35 PERF-004 — last computed snapshot of the in-process synthetic availability monitor (5-minute rolling window). RBAC ItAdmin / ComplianceReviewer. Burn-rate breaches against `RADIOPAD_AVAILABILITY_BURN_RATE_THRESHOLD` are recorded as append-only `SystemAlert` audit rows with `kind="availability_burn_rate"`.
      responses:
        '200':
          description: Current rolling snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  windowSec: { type: integer }
                  totalProbes: { type: integer }
                  errorCount: { type: integer }
                  errorRate: { type: number, format: double, minimum: 0, maximum: 1 }
                  lastCheckedAt: { type: string, format: date-time, nullable: true }
                  targets:
                    type: array
                    items: { type: string }
        '403': { description: RBAC denied (not ItAdmin / ComplianceReviewer). }

  # --- Iter-35 � Versioned clinical validation packs (rulebook golden suites) ---
  /api/validation-packs:
    get:
      summary: |
        Iter-35 � list validation packs for the current tenant. Optionally
        filtered by `rulebookId`. Any tenant member may read.
      parameters:
        - in: query
          name: rulebookId
          schema: { type: string }
      responses:
        '200':
          description: Validation pack list.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    rulebookId: { type: string }
                    version: { type: string }
                    name: { type: string }
                    status: { type: string, enum: [Draft, Approved, Deprecated] }
                    approvedAt: { type: string, format: date-time, nullable: true }
                    approvedBy: { type: string, format: uuid, nullable: true }
                    createdAt: { type: string, format: date-time }
                    createdBy: { type: string, format: uuid }
                    caseCount: { type: integer }
    post:
      summary: |
        Iter-35 � create a new pack from an in-memory payload. RBAC
        MedicalDirector / ItAdmin. Returns 409 with `kind:"validation_packs"`
        when (rulebookId, version) already exists for the tenant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rulebookId, version, goldenCases]
              properties:
                rulebookId: { type: string, description: Snake_case rulebook id (e.g. chest_ct_v1). }
                version: { type: string, description: Pack version (semver). }
                name: { type: string, nullable: true }
                goldenCases:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      report: { type: object }
                      expectFlagged:
                        type: array
                        items: { type: string }
      responses:
        '200': { description: Created (status=Draft). }
        '400': { description: Missing rulebookId / version (kind=validation_packs). }
        '403': { description: RBAC denied (kind=forbidden). }
        '409':
          description: Duplicate pack version for rulebook (kind=validation_packs).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /api/validation-packs/{id}/approve:
    post:
      summary: |
        Iter-35 � promote Draft ? Approved. RBAC MedicalDirector / ItAdmin.
        Re-approving a Deprecated pack returns 409 with
        `kind:"validation_packs"`. Audits `ValidationPackApproved`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Approved. }
        '403': { description: RBAC denied. }
        '404': { description: Pack not found in this tenant. }
        '409': { description: Cannot re-approve a Deprecated pack. }
  /api/validation-packs/{id}/deprecate:
    post:
      summary: |
        Iter-35 � mark a pack as Deprecated. RBAC MedicalDirector / ItAdmin.
        Terminal � a deprecated pack cannot be re-approved. Audits
        `ValidationPackDeprecated`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Deprecated. }
        '403': { description: RBAC denied. }
        '404': { description: Pack not found in this tenant. }
  /api/validation-packs/{id}/run:
    post:
      summary: |
        Iter-35 � execute the pack's golden cases against the latest
        rulebook with the matching `rulebookId` in this tenant. Returns
        `{passed, failed, totalCases, failures}`. Audits
        `ValidationPackRun` with pass/fail counts. RBAC Radiologist+.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Run summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  passed: { type: integer }
                  failed: { type: integer }
                  totalCases: { type: integer }
                  failures:
                    type: array
                    items:
                      type: object
                      properties:
                        caseId: { type: string }
                        missing: { type: array, items: { type: string } }
                        unexpected: { type: array, items: { type: string } }
        '403': { description: RBAC denied. }
        '404': { description: Pack not found in this tenant. }
  /api/validation-packs/{id}/export:
    get:
      summary: |
        Iter-35 � export the pack body (metadata + canonical golden cases).
        RBAC MedicalDirector / ItAdmin.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pack export body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  rulebookId: { type: string }
                  version: { type: string }
                  name: { type: string }
                  status: { type: string }
                  createdAt: { type: string, format: date-time }
                  approvedAt: { type: string, format: date-time, nullable: true }
                  cases: { type: array, items: { type: object } }
        '404': { description: Pack not found in this tenant. }

  # --- Iter-31 TMP-005..008 — template lifecycle + analytics ---
  /api/templates/{id}/approve:
    post:
      summary: Iter-31 TMP-005 — approve a template for production use. RBAC MedicalDirector / ReportingAdmin / ItAdmin. Audited as `TemplateApproved`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Approved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        '403': { description: Caller role not permitted. }
        '404': { description: Template not found in this tenant. }

  /api/templates/{id}/submit-review:
    post:
      summary: Iter-32 TMP-005 — submit a draft template for review. Any role may submit; Deprecated templates are rejected.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Submitted for review.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        '400': { description: Cannot submit a deprecated template (kind=validation). }
        '404': { description: Template not found. }

  /api/templates/{id}/deprecate:
    post:
      summary: Iter-32 TMP-005 — deprecate a template. RBAC MedicalDirector / ReportingAdmin / ItAdmin. Audited as `TemplateDeprecated`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Deprecated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        '403': { description: Caller role not permitted. }
        '404': { description: Template not found. }

  /api/templates/{id}/usage:
    get:
      summary: Iter-32 TMP-006 — template usage analytics. Returns request counts for the last 7 / 30 / 90 days, broken down by user and modality.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Usage analytics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  templateId: { type: string }
                  rowId: { type: string, format: uuid }
                  window:
                    type: object
                    properties:
                      from: { type: string, format: date-time }
                      to: { type: string, format: date-time }
                  counts:
                    type: object
                    properties:
                      last7d: { type: integer }
                      last30d: { type: integer }
                      last90d: { type: integer }
                  byUser:
                    type: array
                    items:
                      type: object
                      properties:
                        userId: { type: string, format: uuid }
                        count: { type: integer }
                  byModality:
                    type: array
                    items:
                      type: object
                      properties:
                        modality: { type: string }
                        count: { type: integer }
        '404': { description: Template not found. }

  /api/templates/{id}/preview:
    get:
      summary: Iter-31 TMP-008 — render a preview of the template sections, optionally merged with a specific report.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - in: query
          name: reportId
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Preview sections.
          content:
            application/json:
              schema:
                type: object
                properties:
                  templateId: { type: string }
                  variant: { type: string }
                  status: { type: string }
                  sections:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }
                        content: { type: string }
        '404': { description: Template not found. }

  # --- Users / devices admin ---
  /api/users:
    get:
      summary: List tenant users. Tenant-scoped.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    email: { type: string }
                    displayName: { type: string }
                    role: { type: string }
                    isActive: { type: boolean }

  /api/users/{id}/lockout:
    post:
      summary: Iter-31 AUTH-006 — soft-lock a user (sets active=false). RBAC MedicalDirector / ItAdmin. Audited as `UserLockedOut`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  isActive: { type: boolean }
                  changed: { type: boolean }
        '400': { description: Cannot lock yourself (kind=validation). }
        '403': { description: RBAC denied. }
        '404': { description: User not found. }

  /api/devices:
    get:
      summary: Iter-31 AUTH-007 — list device-auth pairings (approved/consumed/denied) for the tenant. RBAC ItAdmin / MedicalDirector.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    userCode: { type: string }
                    status: { type: string }
                    userId: { type: string, format: uuid, nullable: true }
                    expiresAt: { type: string, format: date-time }
                    lastPolledAt: { type: string, format: date-time, nullable: true }
                    deviceFingerprint: { type: string, nullable: true }
                    updatedAt: { type: string, format: date-time }
        '403': { description: RBAC denied. }

  /api/devices/{id}:
    delete:
      summary: Revoke a device authorization. RBAC ItAdmin / MedicalDirector.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Revoked. }
        '403': { description: RBAC denied. }
        '404': { description: Device auth not found. }

  # --- Prompt overrides — delete ---
  /api/prompts/overrides/{id}:
    delete:
      summary: Delete a prompt override. RBAC MedicalDirector / ReportingAdmin.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted. }
        '403': { description: RBAC denied. }
        '404': { description: Override not found. }

  # --- Audit search ---
  /api/audit/search:
    get:
      summary: PRD §19.2 — advanced audit search with filters on action, user, report, and substring.
      parameters:
        - { in: query, name: action, schema: { type: string } }
        - { in: query, name: userId, schema: { type: string, format: uuid } }
        - { in: query, name: reportId, schema: { type: string, format: uuid } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: take, schema: { type: integer, default: 200, maximum: 1000 } }
      responses:
        '200':
          description: OK
          headers:
            X-Total-Count: { $ref: '#/components/headers/XTotalCount' }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditEvent' }

  # --- Tenant context ---
  /api/tenant/me:
    get:
      summary: Returns the resolved tenant + user context for the current session.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      slug: { type: string }
                      displayName: { type: string }
                      requirePhiApprovedProvider: { type: boolean }
                  user:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      email: { type: string }
                      displayName: { type: string }
                      role: { type: string }

  # --- Lexicon bulk import/export ---
  /api/lexicon/export:
    get:
      summary: Iter-31 STD-005/STD-006 — bulk export of the tenant lexicon as JSON (default) or YAML. Audited as `LexiconExported`. RBAC MedicalDirector / ReportingAdmin.
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [json, yaml], default: json }
      responses:
        '200':
          description: Exported file.
          content:
            application/json: { schema: { type: string } }
            application/yaml: { schema: { type: string } }
        '400': { description: Invalid format. }
        '403': { description: RBAC denied. }

  /api/lexicon/import:
    post:
      summary: Iter-31 STD-005/STD-006 — bulk upsert of lexicon entries. Audited as `LexiconImported`. RBAC MedicalDirector / ReportingAdmin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries, replaceAll]
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      term: { type: string }
                      forbidden: { type: boolean }
                      replacement: { type: string }
                      note: { type: string }
                replaceAll: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  upserts: { type: integer }
                  removed: { type: integer }
        '400': { description: entries is required (kind=validation). }
        '403': { description: RBAC denied. }

  /api/lexicon/import-csv:
    post:
      summary: Iter-32 STD-006 — bulk import from CSV (header `term,forbidden,replacement,note`). RBAC MedicalDirector / ReportingAdmin. Audited as `LexiconImported`.
      parameters:
        - in: query
          name: replaceAll
          schema: { type: boolean, default: false }
      requestBody:
        required: true
        content:
          text/csv:
            schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  upserts: { type: integer }
                  removed: { type: integer }
        '400': { description: CSV body is empty or unparseable (kind=validation). }
        '403': { description: RBAC denied. }

  # --- Billing features ---
  /api/billing/features:
    get:
      summary: PRD §11.4 — declarative plan-feature flags. Frontend gates UI surfaces on these flags so a Trial tenant cannot walk into an enterprise-only flow.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan: { type: string, enum: [Trial, Team, Enterprise] }
                  features:
                    type: object
                    additionalProperties: { type: boolean }

  # --- Rulebook detail + validation + test ---
  /api/rulebooks/{id}:
    get:
      summary: Get a single rulebook by EF row id.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Rulebook' }
        '404': { description: Not found in tenant. }

  /api/rulebooks/validate:
    post:
      summary: Validate a rulebook YAML without persisting. Returns parsed spec + problems list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml: { type: string }
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  problems:
                    type: array
                    items: { type: string }
                  spec: { type: object }

  /api/rulebooks/test:
    post:
      summary: Run golden-case tests against a rulebook YAML in-memory (no persistence).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml, cases]
              properties:
                yaml: { type: string }
                cases:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      report: { type: object }
                      expectFlagged:
                        type: array
                        items: { type: string }
      responses:
        '200':
          description: Test results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  passed: { type: integer }
                  failed: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        pass: { type: boolean }
                        missing: { type: array, items: { type: string } }
                        unexpected: { type: array, items: { type: string } }

  # --- Report additional endpoints ---
  /api/reports/{id}/quality:
    get:
      summary: PRD §18.4 — heuristic report quality score in [0..100]. Read-only; never persisted nor gating export.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Quality score.
          content:
            application/json:
              schema:
                type: object
                properties:
                  score: { type: integer, minimum: 0, maximum: 100 }
                  reasons:
                    type: array
                    items: { type: string }
                  validationFindings: { type: integer }
        '404': { description: Report not found. }

  /api/reports/{id}/dictation/cleanup:
    post:
      summary: Iter-31 AI-001 — runs the dictation cleanup pipeline. Routes through AiGateway so PHI + audit apply. RBAC Radiologist / MedicalDirector.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rawDictation]
              properties:
                rawDictation: { type: string }
      responses:
        '200':
          description: Cleaned sections.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleanedSections:
                    type: object
                    properties:
                      indication: { type: string }
                      technique: { type: string }
                      findings: { type: string }
                      impression: { type: string }
                      recommendations: { type: string }
                  provider: { type: string }
                  model: { type: string }
                  latencyMs: { type: integer }
                  promptVersion: { type: string }
        '400': { description: rawDictation is required (kind=validation). }
        '403': { description: PHI policy blocked (kind=provider_policy). }
        '404': { description: Report not found. }

  /api/reports/{id}/followup-suggestions:
    get:
      summary: Iter-31 AI-008 — up to three suggested follow-up phrases for a report's recommendations section.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Suggestions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items: { type: string }
        '403': { description: Provider policy blocked. }
        '404': { description: Report not found. }

  /api/reports/{id}/measurements:
    get:
      summary: PRD Beta #7 — extract structured measurements from report text.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Extracted measurements.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    section: { type: string }
                    value: { type: number }
                    unit: { type: string }
                    structure: { type: string }
                    context: { type: string }
        '404': { description: Report not found. }

  /api/reports/import/fhir:
    post:
      summary: Iter-30 — session-authenticated FHIR DiagnosticReport import. RBAC Radiologist / MedicalDirector / ReportingAdmin / ItAdmin. Audited as `ReportImported`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
          application/fhir+json:
            schema: { type: object }
      responses:
        '200':
          description: Created or deduplicated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId: { type: string, format: uuid }
                  status: { type: string }
                  deduplicated: { type: boolean }
        '400': { description: Missing accession or unparseable payload (kind=validation). }
        '403': { description: RBAC denied. }

  # --- PACS bridge proxy ---
  /api/pacs/studies:
    get:
      summary: Iter-32 DESK-007 — QIDO-RS study search proxy. Forwards accession / patientId / studyDate / modality queries through the tenant DICOMweb base URL.
      parameters:
        - { in: query, name: accession, schema: { type: string } }
        - { in: query, name: patientId, schema: { type: string } }
        - { in: query, name: studyDate, schema: { type: string } }
        - { in: query, name: modality, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, maximum: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  upstreamStatus: { type: integer, nullable: true }
                  studies: { type: array, items: { type: object } }
        '403': { description: RBAC denied. }
    post:
      summary: Iter-32 — STOW-RS store proxy. Body must be DICOM bytes (multipart/related). RBAC Radiologist / MedicalDirector / ItAdmin.
      requestBody:
        required: true
        content:
          multipart/related:
            schema: { type: string, format: binary }
          application/dicom:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: Upstream response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  upstreamStatus: { type: integer }
                  response: { type: object, nullable: true }
        '403': { description: RBAC denied. }
        '502': { description: Upstream DICOMweb unreachable. }
        '503': { description: DICOMweb not configured for this tenant. }

  /api/pacs/health:
    get:
      summary: Iter-32 — PACS + Orthanc health probe. Returns reachability for the tenant's DICOMweb base URL and optional bundled Orthanc.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  dicomWeb:
                    type: object
                    properties:
                      configured: { type: boolean }
                      reachable: { type: boolean }
                  orthanc:
                    type: object
                    properties:
                      configured: { type: boolean }
                      reachable: { type: boolean }
                      url: { type: string, nullable: true }

  # --- MCP tool registry ---
  /api/mcp/tools:
    get:
      summary: Iter-31/32 MCP-001 — list registered MCP tools for the current tenant.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    name: { type: string }
                    version: { type: string }
                    kind: { type: string, enum: [BuiltIn, Custom] }
                    isBuiltIn: { type: boolean }
                    scope: { type: string, enum: [ReadOnly, ReadWrite, External] }
                    scopeString: { type: string }
                    status: { type: string, enum: [Submitted, Approved, Blocked] }
                    approved: { type: boolean }
                    approvedBy: { type: string, format: uuid, nullable: true }
                    approvedAt: { type: string, format: date-time, nullable: true }
                    manifestSha256: { type: string }
                    manifestSigned: { type: boolean }
                    allowedConnectorPaths:
                      type: array
                      items: { type: string }
                    createdAt: { type: string, format: date-time }
    post:
      summary: Iter-31/32 MCP-001 — register a new MCP tool. RBAC ReportingAdmin / MedicalDirector / ItAdmin. Audited as `McpToolRegistered`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                version: { type: string }
                kind: { type: string, enum: [BuiltIn, Custom] }
                scope: { type: string, enum: [ReadOnly, ReadWrite, External] }
                scopeString: { type: string }
                isBuiltIn: { type: boolean }
                manifestJson: { type: string }
                manifestSig: { type: string }
                allowedConnectorPaths:
                  type: array
                  items: { type: string }
      responses:
        '200': { description: Registered. }
        '400': { description: name is required (kind=validation). }
        '403': { description: RBAC denied. }
        '409': { description: Tool name already registered (kind=conflict). }

  /api/mcp/tools/{id}:
    get:
      summary: Get a single MCP tool registration by id.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: OK }
        '404': { description: Not found. }
    delete:
      summary: Delete an MCP tool. RBAC MedicalDirector / ItAdmin. Audited as `McpToolBlocked` with reason=deleted.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted. }
        '403': { description: RBAC denied. }
        '404': { description: Not found. }

  /api/mcp/tools/{id}/approve:
    post:
      summary: Iter-31 MCP-002 — approve a tool (Submitted→Approved). RBAC MedicalDirector / ItAdmin. Audited as `McpToolApproved`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Approved. }
        '403': { description: RBAC denied. }
        '404': { description: Not found. }

  /api/mcp/tools/{id}/block:
    post:
      summary: Iter-32 MCP-002 — block a tool (any→Blocked). RBAC MedicalDirector / ItAdmin. Audited as `McpToolBlocked`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, nullable: true }
      responses:
        '200': { description: Blocked. }
        '403': { description: RBAC denied. }
        '404': { description: Not found. }

  /api/mcp/tools/{id}/revoke:
    post:
      summary: Back-compat alias for /block. Audits `McpToolRevoked` instead. RBAC ReportingAdmin / MedicalDirector / ItAdmin.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Revoked (blocked). }
        '403': { description: RBAC denied. }
        '404': { description: Not found. }

  /api/mcp/tools/{id}/invoke:
    post:
      summary: Iter-31 MCP-004 — invoke an approved MCP tool. Subject to scope policy, lifecycle gate, and external-mcp gate. Audited in the invocation ledger.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputJson]
              properties:
                inputJson: { type: string }
                outputJson: { type: string, nullable: true }
                reportId: { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Invocation result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, blocked, error, timeout] }
                  inputHash: { type: string }
                  outputHash: { type: string }
                  latencyMs: { type: integer }
        '403': { description: Scope blocked (kind=mcp_scope_blocked) or tool not approved (kind=mcp_blocked) or external denied (kind=mcp_blocked). }
        '404': { description: Tool not found. }
        '504': { description: Sandbox timeout (kind=mcp_timeout). }

  /api/mcp/tools/{id}/test:
    post:
      summary: Iter-32 MCP-006 — sandboxed test-run for an admin. 5s wall-clock, 256 MiB soft cap, BelowNormal priority. RBAC MedicalDirector / ItAdmin / ReportingAdmin.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputJson]
              properties:
                inputJson: { type: string }
                outputJson: { type: string, nullable: true }
                reportId: { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Test result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, timeout, error, memory_exceeded] }
                  output: { type: string }
                  latencyMs: { type: integer }
                  memoryBytes: { type: integer, format: int64 }
        '403': { description: RBAC denied or scope blocked. }
        '404': { description: Tool not found. }

  # --- SIEM status ---
  /api/siem/status:
    get:
      summary: Iter-32 INT-010 — surfaces the in-process status of each configured SIEM push sink. RBAC ItAdmin / MedicalDirector / ComplianceReviewer.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sinks:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        configured: { type: boolean }
                        lastPushAt: { type: string, format: date-time, nullable: true }
                        lastError: { type: string, nullable: true }
                        totalPushed: { type: integer }
                        totalErrors: { type: integer }
        '403': { description: RBAC denied. }

  # --- Observability: SLO alerts ---
  /api/admin/observability/slo-alerts:
    post:
      summary: Iter-33 — ingest an Alertmanager-format SLO alert payload. Audited as `SystemAlert`. RBAC ItAdmin / MedicalDirector / ComplianceReviewer.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: boolean }
                  alertCount: { type: integer }
        '403': { description: RBAC denied. }

  # --- Orthanc bridge ---
  /api/integrations/orthanc/study-stable:
    post:
      summary: Iter-33 — Orthanc Lua `OnStableStudy` callback. Bearer-authenticated via `RADIOPAD_BRIDGE_TOKEN`. Audited as `StudyReceived`.
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patientId: { type: string, nullable: true }
                accessionNumber: { type: string, nullable: true }
                studyInstanceUid: { type: string, nullable: true }
                modality: { type: string, nullable: true }
                studyDate: { type: string, nullable: true }
      responses:
        '200': { description: Accepted. }
        '401': { description: Invalid bearer. }
        '503': { description: Bridge tenant unknown. }

  /api/integrations/orthanc/sr-stored:
    post:
      summary: Iter-33 — Orthanc Lua `OnStoredInstance` callback for structured reports (SR). Converts DICOM SR JSON to a RadioPad report. Bearer-authenticated.
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { description: Accepted. }
        '400': { description: Malformed SR JSON (kind=validation). }
        '401': { description: Invalid bearer. }
        '503': { description: Bridge tenant unknown. }

  # --- Marketplace additional endpoints ---
  /api/marketplace/listings/create:
    post:
      summary: Create a new draft marketplace listing. Returns listing id + status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, artifactBody]
              properties:
                name: { type: string }
                description: { type: string }
                kind: { type: string, enum: [rulebook, template, prompt_pack] }
                artifactBody: { type: string }
                priceCents: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, enum: [draft] }
        '400': { description: name and artifact body required (kind=validation). }

  /api/marketplace/listings/{id}/submit:
    post:
      summary: Submit a draft listing for review (draft→submitted).
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Submitted. }
        '400': { description: Cannot submit non-draft listing (kind=validation). }
        '404': { description: Listing not found. }

  /api/marketplace/listings/{id}/approve:
    post:
      summary: Approve a submitted listing (submitted→approved). RBAC MedicalDirector / ItAdmin. Creates a Stripe Price for paid items. Audited as `RulebookApproved`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Approved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [approved] }
                  stripePriceId: { type: string, nullable: true }
        '400': { description: Only submitted listings can be approved. }
        '403': { description: RBAC denied. }
        '404': { description: Listing not found. }

  /api/marketplace/listings/{id}/reject:
    post:
      summary: Reject a listing (submitted→rejected). RBAC MedicalDirector / ItAdmin.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, nullable: true }
      responses:
        '200': { description: Rejected. }
        '403': { description: RBAC denied. }
        '404': { description: Listing not found. }

  /api/marketplace/listings/{id}/checkout:
    post:
      summary: Start a Stripe Checkout session for a marketplace listing purchase. Requires the listing publisher to have `chargesEnabled`.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: returnUrl, required: true, schema: { type: string, format: uri } }
      responses:
        '200':
          description: Checkout URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
                  purchaseId: { type: string, format: uuid }
        '404': { description: Listing not found or not approved. }
        '409': { description: Publisher Connect account not ready (kind=connect_not_ready). }
        '503': { description: Stripe not configured. }

  /api/marketplace/connect/onboarding:
    post:
      summary: PRD MKT-006 — start Stripe Connect Express onboarding for the active tenant (publisher). RBAC BillingAdmin / ItAdmin.
      parameters:
        - { in: query, name: returnUrl, required: true, schema: { type: string, format: uri } }
      responses:
        '200':
          description: Onboarding link.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
        '403': { description: RBAC denied. }
        '503': { description: Stripe not configured. }

  # --- WebAuthn additional endpoints ---
  /api/auth/webauthn/credentials:
    get:
      summary: Iter-32 AUTH-001 — list WebAuthn credentials for the current (tenant, user).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    label: { type: string }
                    attestationFormat: { type: string }
                    signCount: { type: integer }
                    lastUsedAt: { type: string, format: date-time, nullable: true }
                    createdAt: { type: string, format: date-time }

  /api/auth/webauthn/credentials/{id}:
    delete:
      summary: Iter-32 AUTH-001 — delete a WebAuthn credential.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted. }
        '404': { description: Credential not found. }
