  /api/ai/sandbox/compare:
    post:
      summary: |
        PRD PROV-005 (iter-34) — run the same prompt across up to four sandbox-class providers and return each output side-by-side.
        Auth: Radiologist | MedicalDirector | ReportingAdmin | ItAdmin.
        Refuses with `409 { kind: "sandbox_required" }` when `Tenant.AllowSandboxRulebooks` is false.
        Refuses with `400 { kind: "providers_not_sandbox" }` when any provider is disabled, not tenant-owned, or not `ProviderComplianceClass.Sandbox`.
        PHI policy in `AiGateway.EnforcePhiPolicy` is still enforced for every dispatch.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SandboxCompareRequest' }
      responses:
        "200":
          description: One row per provider. Failed dispatches carry `error` and zero token / latency counts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SandboxCompareResponse' }
        "400": { description: Validation failed., content: { application/json: { schema: { $ref: '#/components/schemas/Problem' } } } }
        "404": { description: Report not found., content: { application/json: { schema: { $ref: '#/components/schemas/Problem' } } } }
        "409": { description: Tenant has not opted in to sandbox runs., content: { application/json: { schema: { $ref: '#/components/schemas/Problem' } } } }

  /api/prompts/overrides:
    get:
      summary: Iter-31/32 AI-009 — list prompt-block overrides (Draft + Approved) for the current tenant.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    rulebookId: { type: string }
                    blockKey: { type: string }
                    body: { type: string }
                    status: { type: string, enum: [Draft, Approved] }
                    approvedByUserId: { type: string, format: uuid, nullable: true }
                    approvedAt: { type: string, format: date-time, nullable: true }
    post:
      summary: Upsert a prompt override. Iter-32 AI-009 — every save lands as `Draft` and never reaches the AI runtime until approved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rulebookId, blockKey, body]
              properties:
                id: { type: string, format: uuid, nullable: true }
                rulebookId: { type: string }
                blockKey: { type: string }
                body: { type: string }
      responses:
        "200":
          description: Upserted as Draft.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, enum: [Draft] }

  /api/prompts/overrides/{id}/approve:
    post:
      summary: Iter-32 AI-009 — promote a Draft override to Approved. **MedicalDirector only** (separation of duties). Audited as `PromptOverrideApproved`.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
