            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Caller role not permitted (kind=forbidden).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /api/templates:
