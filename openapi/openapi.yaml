                  lastVerifiedAt: { type: string, format: date-time, nullable: true }

  /api/usage/summary:
    get:
      summary: Per-tenant AI usage rollup (PRD §17.2 / BILL-001..004)
      parameters:
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to,   schema: { type: string, format: date-time } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRequests: { type: integer }
                  okCount: { type: integer }
                  blockedCount: { type: integer }
                  errorCount: { type: integer }
                  inputTokens: { type: integer, format: int64 }
                  outputTokens: { type: integer, format: int64 }
                  avgLatencyMs: { type: integer }
                  costTotalUsd:
                    type: number
                    format: double
                    description: |
                      Iter-34 BILL-005 — total USD cost for the window, summed
                      across `byProvider[].costTotalUsd`. Zero when no current
                      `ProviderConfig` matches any historical `AiRequest.Provider`.
                  byProvider:
                    type: array
                    items:
                      type: object
                      properties:
                        provider: { type: string }
                        adapter: { type: string }
                        requests: { type: integer }
                        inputTokens: { type: integer, format: int64 }
                        outputTokens: { type: integer, format: int64 }
                        costInputUsd:
                          type: number
                          format: double
                          description: |
                            `(inputTokens / 1000) * ProviderConfig.CostPerInputKToken`
                            for the matching tenant provider; `0` when unpriced.
                        costOutputUsd:
                          type: number
                          format: double
                          description: |
                            `(outputTokens / 1000) * ProviderConfig.CostPerOutputKToken`
                            for the matching tenant provider; `0` when unpriced.
                        costTotalUsd:
                          type: number
                          format: double
                          description: Sum of `costInputUsd` + `costOutputUsd`.
                        unpriced:
                          type: boolean
                          description: |
                            `true` when no current `ProviderConfig` row matches
                            this row's `provider` name (e.g. retired provider);
                            cost columns stay `0`.

