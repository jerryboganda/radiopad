  /api/billing/webhook:
    post:
      summary: |
        Stripe webhook receiver. Validates the `Stripe-Signature` header
        against `RADIOPAD_STRIPE_WEBHOOK_SECRET` (legacy `STRIPE_WEBHOOK_SECRET`
        accepted for one release) and updates `TenantSettings`. Events are
        deduplicated against `StripeWebhookEvents` by `(Source, EventId)` so
        retried deliveries are idempotent without colliding with marketplace
        webhook events. UNAUTHENTICATED — security comes from signature
        verification.

        Iter-36 supported event types: `checkout.session.completed`,
        `customer.subscription.created`, `customer.subscription.updated`,
        `customer.subscription.deleted`, `invoice.payment_succeeded`
        (clears `gracePeriodUntil` + `suspendedAt`, sets
        `subscriptionStatus = "active"`), `invoice.payment_failed`
        (opens 7-day `gracePeriodUntil`; escalates to `suspendedAt` once
        that window has elapsed). Other event types are accepted, deduped
        and ignored.
      parameters:
        - in: header
          name: Stripe-Signature
          required: true
          schema: { type: string }
          description: |
            Stripe HMAC signature header (`t=<unix>,v1=<hmac>`). A missing
            or malformed header is treated as a verification failure (400).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                id: { type: string }
                type: { type: string, description: "Stripe event type, e.g. invoice.payment_failed" }
              required: [id, type]
      responses:
        "200":
          description: Event accepted (or duplicate).
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean }
                  deduped: { type: boolean }
        "400":
          description: Invalid / missing Stripe signature (RFC-7807 problem details).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "503":
          description: Webhook not configured (`RADIOPAD_STRIPE_WEBHOOK_SECRET` missing).

  /api/billing/status:
    get:
      summary: |
        PRD BILL-002/004 — current plan, subscription status, trial / grace /
        suspended timestamps, and whether the tenant has a Stripe customer.
        Read-only; tenant-scoped.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BillingStatus" }

  /api/billing/credits:
    get:
      summary: |
        PRD BILL-002 / BILL-007 — month-to-date AI credit balance (calls +
        input/output tokens) against the tenant's plan limits, plus the
