              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Tampering detected (kind=audit_chain_broken).
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  kind: { type: string, enum: [audit_chain_broken] }
                  eventCount: { type: integer }
