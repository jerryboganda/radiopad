rulebook_id: brain_mri_v1
name: Brain MRI Reporting Rulebook
version: 1.0.0
owner: Neuroradiology Committee
status: approved
applies_to:
  modalities:
    - MR
    - MRI
  body_parts:
    - Brain
    - Head
style:
  tone: concise_clinical
  impression_max_bullets: 4
  avoid_terms:
    - unremarkable
  approved_followups:
    - Recommend clinical correlation.
    - Recommend neurology consult if clinically warranted.
    - Recommend follow-up MRI in 6 months.
required_sections:
  - Indication
  - Technique
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right findings must match impression.
  - id: measurement_consistency
    severity: warning
    description: Lesion measurements must match across sections.
  - id: negation_conflict
    severity: blocker
    description: Findings denials must not be asserted in impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid CT/US phrasing in an MRI report.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed 4 bullets.
  - id: critical_result_language
    severity: blocker
    description: Critical findings (acute infarct, large-vessel occlusion, intracranial haemorrhage, herniation) require approved communication/escalation language.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: |-
    You are assisting a board-certified neuroradiologist drafting a structured Brain MRI report with the precision of a senior consultant, including stroke / DWI protocols. Never invent findings; report only what the images and dictation support. Preserve laterality, sequence-specific signal characteristics, and every measurement exactly. For suspected acute stroke, anchor the read in diffusion: true acute infarction restricts on DWI with corresponding low ADC (dark on ADC), distinguishing it from T2 shine-through (DWI bright but ADC not low); localise the territory (ICA/MCA — M1/M2, ACA, PCA, vertebrobasilar, lacunar/perforator) and estimate volume or extent. Screen GRE/SWI for haemorrhage or microbleeds and exclude intracranial haemorrhage before attributing symptoms to ischaemia. Note any large-vessel occlusion or susceptibility/flow-void abnormality, mass effect, midline shift and grey–white differentiation. Where the DWI lesion footprint is mapped to the MCA territory, report the corresponding ASPECTS (0–10) so the burden is reproducible. Output only the requested section; do not sign the report.
  impression: |-
    Produce a concise impression (max 4 bullets), faithful to the Findings, leading with the dominant acute finding. State whether there is an acute infarct (DWI-positive / ADC-low), its vascular territory and laterality, and — for MCA-territory ischaemia — the ASPECTS (0–10, lower scores indicating larger established core). Explicitly state the presence or absence of intracranial haemorrhage and any large-vessel occlusion, and flag mass effect, midline shift or herniation as time-critical. Draw any recommendation only from style.approved_followups and add no findings absent from the Findings.
  cleanup: |-
    Improve grammar without changing clinical meaning, laterality, signal characteristics, ASPECTS, or any measurement.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality, and negation exactly. If a section was not dictated, return an empty string for it.