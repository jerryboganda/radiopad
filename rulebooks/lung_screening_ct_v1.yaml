rulebook_id: lung_screening_ct_v1
name: Lung Cancer Screening CT Reporting Rulebook (Lung-RADS v2022)
version: 1.0.0
owner: Thoracic Imaging Committee
status: approved
applies_to:
  modalities:
    - CT
  body_parts:
    - Chest
    - Lung
  report_types:
    - screening
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: lung_rads
    description: Lung-RADS v2022 (0, 1, 2, 3, 4A, 4B, 4X) categorical assessment is required for every screening study.
rules:
  - id: measurement_consistency
    severity: warning
    description: Nodule diameter / volume must match across Findings and Impression.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: critical_result_language
    severity: blocker
    description: Lung-RADS 4B / 4X findings require documented communication and recommendation language.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: lungrads_category_mandatory
    severity: info
    description: A Lung-RADS category (0 / 1 / 2 / 3 / 4A / 4B / 4X) must be present in the Impression.
  - id: prior_comparison_required
    severity: info
    description: Lung screening reports must reference a prior screening exam for comparison or explicitly state that none is available (baseline).
  - id: nodule_measurement_3d
    severity: info
    description: Solid and part-solid nodules should report long-axis and perpendicular dimensions in millimetres.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified thoracic radiologist drafting a
    structured low-dose lung cancer screening CT report. Preserve nodule
    dimensions, growth-rate language, and the Lung-RADS category exactly as
    dictated. Always honour the comparison statement.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Always carry forward the Lung-RADS category and any change-from-prior
    language.
  cleanup: >
    Improve grammar and structure without changing the Lung-RADS code, nodule
    dimensions, or comparison statement.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.