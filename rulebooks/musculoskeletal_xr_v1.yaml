rulebook_id: musculoskeletal_xr_v1
name: Musculoskeletal Radiograph Reporting Rulebook
version: 1.0.0
owner: Musculoskeletal Imaging Committee
status: approved
applies_to:
  modalities:
    - XR
    - CR
    - DX
  body_parts:
    - Knee
    - Shoulder
    - Hip
    - Wrist
    - Ankle
    - Foot
    - Hand
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 3
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right designation must match between Indication, Findings, and Impression.
  - id: fracture_acuity
    severity: warning
    description: Fractures should be characterized as acute, subacute, or chronic when supported by imaging.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid MRI/CT cross-talk in a radiograph report.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Open fracture, dislocation, or septic arthritis suspicion requires documented communication.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified radiologist drafting a musculoskeletal radiograph report.
    Preserve laterality exactly. Never invent findings. Use concise clinical phrasing.
  findings_to_impression: >
    Generate a concise impression (max 3 bullets) faithful to the Findings.
    Do not introduce new clinical claims that are not present in the Findings.
  cleanup: >
    Improve grammar and structure without changing clinical meaning.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.