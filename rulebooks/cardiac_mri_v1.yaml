rulebook_id: cardiac_mri_v1
name: Cardiac MRI Reporting Rulebook
version: 1.1.0
owner: Cardiac Imaging Committee
status: approved
applies_to:
  modalities:
    - MRI
  body_parts:
    - Heart
    - Cardiac
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right ventricle and atrium findings must match impression.
  - id: measurement_consistency
    severity: warning
    description: Ventricular volumes (EDV/ESV) and ejection fraction must match across sections.
  - id: negation_conflict
    severity: blocker
    description: Findings denials must not be asserted in impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid referencing CT/echo cross-talk in a cardiac MRI report unless explicitly comparing.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Critical findings (e.g. acute myocardial infarction with viable myocardium at risk) require approved communication/escalation language.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified cardiothoracic radiologist drafting a structured
    Cardiac MRI report. Never invent findings. Always preserve laterality (RV/LV, RA/LA),
    chamber sizes, and quantitative ejection fractions exactly as dictated. Write complete, precise clinical sentences and provide the standard systematic review with pertinent negatives.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings section. Include
    LV ejection fraction and any chamber/wall abnormalities. Do not introduce new clinical
    claims that are not present in the Findings.
  cleanup: >
    Improve grammar and structure without changing clinical meaning, EF, or volume values.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.