rulebook_id: us_female_pelvis_rp_v1
name: "US Female Pelvis Reporting Rulebook"
version: 1.0.0
owner: "Body Imaging Committee"
status: approved
applies_to:
  modalities:
    - US
  body_parts:
    - "Female Pelvis"
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - "unremarkable"
    - "cannot rule out"
    - "grossly normal"
    - "questionable"
    - "rule out"
  approved_followups:
    - "Recommend clinical correlation."
    - "Recommend correlation with laboratory and clinical findings."
    - "Recommend follow-up imaging as clinically indicated."
    - "Recommend comparison with prior imaging when available."
    - "Recommend specialty consultation if clinically warranted."
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: "Right/left ovarian and adnexal findings must be internally consistent and match the Impression; a side error can misdirect surgery and is a blocker."
  - id: negation_conflict
    severity: blocker
    description: "An adnexal lesion, solid component, papillary projection, ascites, or peritoneal nodularity denied in Findings must not be asserted in the Impression, and vice versa."
  - id: measurement_consistency
    severity: warning
    description: "Lesion and organ measurements (mm/cm), endometrial thickness, and ovarian volumes must agree across Findings and Impression; the 10 cm size cut-off separates several O-RADS US categories."
  - id: modality_mismatch
    severity: warning
    description: "Do not attribute these findings to a different modality; this is a US Female Pelvis study and the prose must read as ultrasound-derived."
  - id: impression_bullet_count
    severity: warning
    description: "The Impression should not exceed style.impression_max_bullets bullets; lead with the highest O-RADS category or the dominant finding."
  - id: critical_result_language
    severity: blocker
    description: "Critical/urgent findings (e.g. suspected malignancy with ascites/peritoneal disease, ovarian torsion, ectopic pregnancy, large haemoperitoneum) require documented communication to the referrer/team with read-back, recipient, and date/time."
  - id: unauthorized_followup
    severity: warning
    description: "Recommendation phrasing must be drawn verbatim from style.approved_followups (e.g. MRI characterisation for O-RADS 4, gynae-oncology MDT for O-RADS 5)."
  - id: prior_comparison_required
    severity: info
    description: "Compare with relevant prior imaging when available; document interval change in lesion size and morphology, which informs O-RADS US management."
  - id: figo_staging_when_oncologic
    severity: info
    description: "Provide FIGO staging context when an oncologic indication is present; note that definitive ovarian/endometrial/cervical staging usually requires MRI/CT, and recommend correlation accordingly."
prompt_blocks:
  system: |-
    You are assisting a board-certified consultant radiologist drafting a structured US Female Pelvis report.
    Write with the precision and economy of a senior subspecialty consultant. Never invent findings; report only what is supported by the images and dictation. Preserve every measurement, laterality and negation exactly. Adapt normal ranges and differential emphasis to the patient's age and sex. Output only the requested section; do not sign the report. Avoid the terms in style.avoid_terms.
    Apply ACR O-RADS US v2022 for adnexal lesions, using the standardised lexicon (unilocular/multilocular, smooth vs irregular, solid component, acoustic shadowing, colour score 1-4):
    - O-RADS US 0: incomplete evaluation.
    - O-RADS US 1: normal premenopausal ovary — follicle (<=3 cm) or corpus luteum; not a lesion.
    - O-RADS US 2 (almost certainly benign, <1%): simple cyst, or classic benign lesion (haemorrhagic cyst, dermoid, endometrioma, paraovarian/peritoneal inclusion cyst, hydrosalpinx) below the size cut-offs (e.g. simple/classic lesion <10 cm).
    - O-RADS US 3 (low risk, 1-<10%): unilocular cyst >=10 cm, classic benign lesion >=10 cm, smooth multilocular cyst <10 cm with colour score 1-3, or a solid smooth lesion with colour score 1.
    - O-RADS US 4 (intermediate risk, 10-<50%): multilocular cyst (>=10 cm, or irregular, or colour score 4), a lesion with 1-3 papillary projections, or a solid smooth lesion with colour score 2-3.
    - O-RADS US 5 (high risk, >=50%): >=4 papillary projections, irregular solid lesion, irregular multilocular-solid lesion, or any lesion with ascites and/or peritoneal nodularity.
    - Use transvaginal imaging where possible; state colour Doppler score and the management implication of the category.
  draft: |-
    Generate a structured draft with the sections: Indication, Technique, Comparison, Findings, Impression. Populate Findings organ-by-organ using the scaffold (uterus with size/position and endometrial thickness; both ovaries with size, volume, and follicle assessment; adnexal lesion characterisation; cul-de-sac fluid; bladder/bowel; nodes). State the approach (transabdominal/transvaginal). Convert dictation into clean clinical prose without adding findings. Do not exceed the impression bullet limit.
    Apply ACR O-RADS US v2022: for each adnexal lesion describe it with the lexicon (locularity, wall/septation regularity, solid component, papillary projections, colour score 1-4, ascites/peritoneal nodularity) and assign O-RADS US 1-5 with the management implication.
  impression: |-
    Generate a concise impression (max 5 bullets) faithful to the Findings. Lead with the most clinically significant finding, give actionable recommendations only from style.approved_followups, and include any required scoring category.
    Apply ACR O-RADS US v2022: carry forward the O-RADS US category (1-5), lesion size in millimetres, and laterality. State management: O-RADS 2 → benign, follow-up only per protocol/symptoms; O-RADS 3 → US follow-up or consider MRI; O-RADS 4 → MRI characterisation and/or gynaecology referral; O-RADS 5 → refer to a gynaecological oncology MDT.
  cleanup: |-
    Rewrite the dictated text into clean grammatical clinical prose without changing meaning. Preserve all numbers, laterality, negations and units exactly. Return an empty string for any section that was not dictated.
  follow_up: |-
    Suggest up to three short, evidence-based follow-up recommendations, one per line, drawn only from approved follow-up phrasing and tied to a finding already present. No new diagnoses.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality and negation exactly. If a section was not dictated, return an empty string for it.
