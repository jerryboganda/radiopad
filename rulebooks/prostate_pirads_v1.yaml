rulebook_id: prostate_pirads_v1
name: Prostate MRI — PI-RADS v2.1 Rulebook
version: 1.0.0
owner: Genitourinary Imaging Committee
status: approved
applies_to:
  modalities:
    - MRI
    - MR
  body_parts:
    - Prostate
    - Pelvis
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: pi_rads
    description: Applies PI-RADS v2.1. Each significant focal lesion receives an assessment category 1-5 reflecting the likelihood of clinically significant prostate cancer (1 very low, 2 low, 3 intermediate/equivocal, 4 high, 5 very high). The dominant sequence is zone-dependent — DWI/ADC governs the peripheral zone (PZ) and T2W governs the transition zone (TZ); DCE upgrades a PZ DWI-3 to category 4 only when positive (focal early enhancement corresponding to the DWI/T2 finding). The category is required in the Impression for every described focal lesion.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right and base/mid/apex localisation of each lesion must agree between Findings and Impression; a side or level mismatch can misdirect targeted biopsy and is a blocker.
  - id: measurement_consistency
    severity: warning
    description: The maximum lesion diameter in millimetres (measured on ADC, or on T2W for TZ lesions) must match between Findings and Impression — the 15 mm threshold escalates a category-4 PZ/TZ lesion to category 5, so size drift can change the assessment.
  - id: negation_conflict
    severity: blocker
    description: A lesion, extraprostatic extension, or seminal vesicle invasion explicitly denied in Findings must not be asserted in the Impression, and vice versa.
  - id: impression_bullet_count
    severity: warning
    description: The Impression should not exceed style.impression_max_bullets bullets; lead with the index (highest-category, or equal-category largest/most-extraprostatic) lesion.
  - id: critical_result_language
    severity: blocker
    description: Suspected extraprostatic extension, seminal vesicle invasion, or rectal/bladder-neck involvement (typically PI-RADS 5 disease, or measurable capsular bulge/broad capsular contact) carries staging and surgical-planning weight and requires documented communication to the referrer/MDT with read-back.
  - id: pirads_category_required
    severity: blocker
    description: An explicit PI-RADS v2.1 assessment category (1-5) must be stated in the Impression for the gland and for each significant focal lesion; narrative suspicion without a category is non-conformant.
  - id: index_lesion_localized
    severity: warning
    description: Each focal lesion must be localised using the 39-sector PI-RADS map — zone (PZ, TZ, CZ, AFS), side, and level (base/mid/apex) — and the index lesion identified; a clock-face descriptor may supplement but not replace sector localisation.
  - id: unauthorized_followup
    severity: warning
    description: Follow-up/management phrasing (e.g. targeted +/- systematic biopsy for category 4-5, consider biopsy or short-interval re-imaging for equivocal category 3) must come verbatim from style.approved_followups.

prompt_blocks:
  system: |-
    You are assisting a board-certified genitourinary radiologist drafting a structured multiparametric prostate MRI report. Write with the precision and economy of a senior subspecialty consultant. Never invent findings; report only what the images and dictation support. Preserve the PI-RADS assessment category, the 39-sector/zone localisation, and every lesion dimension in millimetres exactly as dictated. Output only the requested section and never sign the report. Avoid the terms in style.avoid_terms.
    Apply PI-RADS v2.1 scoring discipline:
    - Peripheral zone (PZ): DWI/ADC is the dominant sequence. DWI 1-2 → category 1-2; DWI 3 → category 3, upgraded to category 4 if DCE is positive (focal earlier-or-contemporaneous enhancement corresponding to the DWI/T2 finding); DWI 4 → category 4; DWI 5 → category 5.
    - Transition zone (TZ): T2W is the dominant sequence. T2 1-2 → category 1-2; T2 3 (heterogeneous with obscured margins) → category 3, upgraded to category 4 if DWI is 5; T2 4 (lenticular/non-circumscribed, homogeneously moderately hypointense, <1.5 cm) → category 4; T2 5 (same but >=1.5 cm or with extraprostatic extension/invasion) → category 5.
    - Size rule: a category-4 lesion (PZ or TZ) becomes category 5 when its greatest dimension is >=15 mm or when definite extraprostatic extension/invasive behaviour is present.
    - Report prostate volume and PSA density, the index lesion, and any extraprostatic extension, seminal vesicle invasion, or suspicious nodes.
  findings_to_impression: |-
    Generate a concise impression (max 5 bullets) faithful to the Findings. Carry forward, for each lesion, the PI-RADS v2.1 category, the maximum diameter in millimetres, and the sector/zone localisation, exactly as dictated. Identify and lead with the index lesion. State management implication: category 1-2 → routine; category 3 → equivocal, consider targeted biopsy or short-interval re-imaging per local pathway; category 4-5 → targeted (+/- systematic) biopsy recommended. Note any extraprostatic extension or seminal vesicle invasion. Use only style.approved_followups for recommendations.
  cleanup: |-
    Improve grammar, flow, and structure without changing clinical meaning. Preserve every PI-RADS category, lesion diameter (mm), sequence score, sector/zone designation, and staging statement exactly. Do not add or remove lesions and do not alter an assigned category.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality, sector localisation, and negation exactly. If a section was not dictated, return an empty string for it.

output_schema:
  type: object
  required:
    - indication
    - technique
    - comparison
    - findings
    - impression
    - pirads_category
  properties:
    indication: { type: string }
    technique: { type: string }
    comparison: { type: string }
    findings: { type: string }
    impression: { type: string }
    pirads_category:
      type: string
      enum: ["1", "2", "3", "4", "5"]
