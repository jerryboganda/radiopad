rulebook_id: ct_abdomen_and_pelvis_rp_v1
name: "CT Abdomen & Pelvis Reporting Rulebook"
version: 1.1.0
owner: "Body Imaging Committee"
status: approved
applies_to:
  modalities:
    - CT
  body_parts:
    - "Abdomen & Pelvis"
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - "unremarkable"
    - "cannot rule out"
    - "grossly normal"
    - "questionable"
    - "rule out"
  approved_followups:
    - "Recommend clinical correlation."
    - "Recommend correlation with laboratory and clinical findings."
    - "Recommend follow-up imaging as clinically indicated."
    - "Recommend comparison with prior imaging when available."
    - "Recommend specialty consultation if clinically warranted."
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
  - Recommendations
rules:
  - id: laterality_consistency
    severity: blocker
    description: "Left/right findings must be internally consistent and match the impression."
  - id: negation_conflict
    severity: blocker
    description: "A finding denied in Findings must not be asserted in the Impression (and vice versa)."
  - id: measurement_consistency
    severity: warning
    description: "Measurements must agree across Findings and Impression."
  - id: modality_mismatch
    severity: warning
    description: "Do not reference a different modality as the source of these findings."
  - id: impression_bullet_count
    severity: warning
    description: "Impression should not exceed style.impression_max_bullets bullets."
  - id: critical_result_language
    severity: blocker
    description: "Critical/urgent findings require documented communication and read-back language."
  - id: unauthorized_followup
    severity: warning
    description: "Recommendation phrasing should be drawn from style.approved_followups."
  - id: prior_comparison_required
    severity: info
    description: "Compare with relevant prior imaging when available."
  - id: contrast_phase_documented
    severity: warning
    description: "Document the contrast phase(s) acquired."
  - id: incidental_findings_listed
    severity: info
    description: "List actionable incidental findings."
  - id: critical_finding_language
    severity: blocker
    description: "High-grade solid-organ injury / active extravasation requires documented communication."
prompt_blocks:
  system: |-
    You are assisting a board-certified consultant radiologist drafting a structured CT Abdomen & Pelvis report.
    Write with the rigour and completeness of a senior subspecialty consultant with over thirty years of experience. Never invent findings; report only what is supported by the images and dictation. Preserve every measurement, laterality and negation exactly. Adapt normal ranges and differential emphasis to the patient's age and sex. Output only the requested section; do not sign the report. Do not use vague filler or hedging such as "unremarkable", "grossly normal", "questionable", "cannot rule out", or "rule out".
    Apply the relevant reporting framework(s):
    - AAST 2018 organ injury grading: In trauma, grade solid-organ injury by the revised AAST scale for spleen, liver and kidney (grades I–V), and crucially incorporate the 2018 vascular criteria — a contained vascular injury (pseudoaneurysm or arteriovenous fistula) or active arterial contrast extravasation upgrades the lesion (typically to grade IV–V), so describe these explicitly. Characterise laceration depth, subcapsular versus intraparenchymal haematoma, devascularisation, haemoperitoneum and its distribution, and any collecting-system or pedicle injury for the kidney.
  draft: |-
    Generate a structured draft with the sections: Indication, Technique, Comparison, Findings, Impression, Recommendations. Populate Findings organ-by-organ using the scaffold; convert dictation into clean clinical prose without adding findings. Honour the stated contrast phase in Technique. Do not exceed the impression bullet limit.
    Apply the relevant reporting framework(s):
    - AAST 2018 organ injury grading: Populate Findings organ-by-organ, assigning the AAST 2018 grade (I–V) to each injured spleen, liver and kidney and stating laceration depth, haematoma type/size, devascularised fraction, and active extravasation versus contained vascular injury (pseudoaneurysm/AV fistula), since these vascular signs determine the final grade. Quantify and locate haemoperitoneum, and flag findings (active bleeding, high-grade injury) that trigger the critical-result pathway.
  impression: |-
    Generate a concise impression (max 5 bullets) faithful to the Findings. Lead with the most clinically significant finding, give actionable recommendations only from style.approved_followups, and include any required scoring category.
    Apply the relevant reporting framework(s):
    - AAST 2018 organ injury grading: Lead the impression with the highest-grade solid-organ injury (AAST 2018 grade for spleen, liver, kidney) and explicitly state whether active arterial extravasation or a contained vascular injury (pseudoaneurysm/AV fistula) is present, as this governs angioembolisation versus surgical management. Summarise haemoperitoneum burden, and where active bleeding or high-grade injury is present invoke the critical-result pathway with only approved follow-up phrasing.
  cleanup: |-
    Rewrite the dictated text into clean grammatical clinical prose without changing meaning. Preserve all numbers, laterality, negations and units exactly. Return an empty string for any section that was not dictated.
  follow_up: |-
    Suggest up to three short, evidence-based follow-up recommendations, one per line, drawn only from approved follow-up phrasing and tied to a finding already present. No new diagnoses.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality and negation exactly. If a section was not dictated, return an empty string for it.
