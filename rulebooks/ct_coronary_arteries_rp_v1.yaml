rulebook_id: ct_coronary_arteries_rp_v1
name: "CT Coronary Arteries Reporting Rulebook"
version: 1.0.0
owner: "Cardiac Imaging Committee"
status: approved
applies_to:
  modalities:
    - CT
  body_parts:
    - "Coronary Arteries"
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - "unremarkable"
    - "cannot rule out"
    - "grossly normal"
    - "questionable"
    - "rule out"
  approved_followups:
    - "Recommend clinical correlation."
    - "Recommend correlation with laboratory and clinical findings."
    - "Recommend follow-up imaging as clinically indicated."
    - "Recommend comparison with prior imaging when available."
    - "Recommend specialty consultation if clinically warranted."
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
  - Recommendations
rules:
  - id: laterality_consistency
    severity: blocker
    description: "Left/right findings must be internally consistent and match the impression."
  - id: negation_conflict
    severity: blocker
    description: "A finding denied in Findings must not be asserted in the Impression (and vice versa)."
  - id: measurement_consistency
    severity: warning
    description: "Measurements must agree across Findings and Impression."
  - id: modality_mismatch
    severity: warning
    description: "Do not reference a different modality as the source of these findings."
  - id: impression_bullet_count
    severity: warning
    description: "Impression should not exceed style.impression_max_bullets bullets."
  - id: critical_result_language
    severity: blocker
    description: "Critical/urgent findings require documented communication and read-back language."
  - id: unauthorized_followup
    severity: warning
    description: "Recommendation phrasing should be drawn from style.approved_followups."
  - id: prior_comparison_required
    severity: info
    description: "Compare with relevant prior imaging when available."
  - id: contrast_phase_documented
    severity: warning
    description: "Document the contrast phase(s) acquired."
prompt_blocks:
  system: |-
    You are assisting a board-certified consultant radiologist drafting a structured CT Coronary Arteries report.
    Write with the precision and economy of a senior subspecialty consultant. Never invent findings; report only what is supported by the images and dictation. Preserve every measurement, laterality and negation exactly. Adapt normal ranges and differential emphasis to the patient's age and sex. Output only the requested section; do not sign the report. Avoid the terms in style.avoid_terms.
    Apply the relevant reporting framework(s):
    - CAD-RADS 2.0: Assess each major vessel and grade the maximal luminal stenosis (0 none, 1 minimal 1–24%, 2 mild 25–49%, 3 moderate 50–69%, 4 severe 70–99% with 4A and 4B/left-main subgroups, 5 total occlusion). Derive the overall per-patient CAD-RADS category from the most severe segment, report plaque burden as P1–P4 (driven by calcium score or visual/segment-involvement extent), and append modifiers where applicable: N (non-diagnostic/uninterpretable segments), HRP (high-risk plaque — positive remodelling, low attenuation, napkin-ring, spotty calcification), I (ischaemia on CT-FFR/perfusion), S (stent), G (graft). State coronary dominance and anomalies.
  draft: |-
    Generate a structured draft with the sections: Indication, Technique, Comparison, Findings, Impression, Recommendations. Populate Findings organ-by-organ using the scaffold; convert dictation into clean clinical prose without adding findings. Honour the stated contrast phase in Technique. Do not exceed the impression bullet limit.
    Apply the relevant reporting framework(s):
    - CAD-RADS 2.0: Build Findings vessel-by-vessel (left main, LAD with diagonals, LCx with obtuse marginals, RCA with PDA), recording the maximal per-vessel stenosis grade (0–5), the plaque burden category P1–P4, and any modifiers (N, HRP, I, S, G). Carry the calcium (Agatston) score when performed and state dominance so the overall CAD-RADS category in the impression is fully supported by the segmental description.
  impression: |-
    Generate a concise impression (max 5 bullets) faithful to the Findings. Lead with the most clinically significant finding, give actionable recommendations only from style.approved_followups, and include any required scoring category.
    Apply the relevant reporting framework(s):
    - CAD-RADS 2.0: Lead the impression with the overall per-patient CAD-RADS category (0–5, taken from the most severe vessel) together with the plaque-burden category (P1–P4) and any active modifiers (N, HRP, I, S, G), then translate that category into the guideline-aligned management tier using only approved follow-up phrasing. Higher categories (4B/left main, 5) and the HRP or I modifiers should prompt onward cardiology correlation.
  cleanup: |-
    Rewrite the dictated text into clean grammatical clinical prose without changing meaning. Preserve all numbers, laterality, negations and units exactly. Return an empty string for any section that was not dictated.
  follow_up: |-
    Suggest up to three short, evidence-based follow-up recommendations, one per line, drawn only from approved follow-up phrasing and tied to a finding already present. No new diagnoses.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality and negation exactly. If a section was not dictated, return an empty string for it.
