rulebook_id: prostate_mri_v1
name: Prostate MRI Reporting Rulebook (PI-RADS v2.1)
version: 1.0.0
owner: Genitourinary Imaging Committee
status: approved
applies_to:
  modalities:
    - MRI
    - MR
  body_parts:
    - Prostate
    - Pelvis
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: pi_rads
    description: PI-RADS v2.1 (1..5) categorical assessment is required in the Impression.
rules:
  - id: measurement_consistency
    severity: warning
    description: Index lesion size (mm) must match across Findings and Impression.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: critical_result_language
    severity: blocker
    description: Suspected extraprostatic extension or seminal vesicle invasion in PI-RADS 5 lesions requires documented communication.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: pirads_category_mandatory
    severity: info
    description: A PI-RADS category (1..5) must accompany every described focal lesion in the Impression.
  - id: index_lesion_localized
    severity: info
    description: The index lesion should be localised to a sector, clock face, or anatomic zone (PZ / TZ / CZ).  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified genitourinary radiologist drafting a
    structured prostate MRI report. Preserve PI-RADS category, sector / zone
    localisation, and lesion dimensions in millimetres exactly as dictated.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Always carry forward the PI-RADS category, lesion size, and sector
    localisation.
  cleanup: >
    Improve grammar and structure without changing PI-RADS code, lesion size,
    or sector designations.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.