# This file is a curated ~200-term subset covering common chest, abdomen, and
# musculoskeletal anatomy plus high-frequency finding descriptors. It is NOT
# the full RadLex ontology — consumers needing the complete lexicon should
# download it from RSNA directly. The schema is RadioPad-specific:
#   rid:            stable RadLex Identifier (e.g. "RID28477").
#   preferredLabel: human-readable label.
#   synonyms:       alternate spellings / abbreviations the validator and the
#                   AI gateway can fold to the preferred label.
#   category:       coarse bucket — "anatomy" | "finding" | "modality" |
#                   "technique" | "qualifier".
