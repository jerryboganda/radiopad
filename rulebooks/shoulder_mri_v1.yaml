rulebook_id: shoulder_mri_v1
name: Shoulder MRI / MR Arthrogram Reporting Rulebook
version: 1.1.1
owner: Musculoskeletal Imaging Committee
status: approved
applies_to:
  modalities:
    - MRI
    - MR
  body_parts:
    - Shoulder
  report_types:
    - diagnostic
    - mr_arthrogram
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left / right shoulder references must remain consistent between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Tear and effusion measurements (mm) must match across sections.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid CT / X-ray cross-talk in an MRI report.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: rotator_cuff_thickness_described
    severity: info
    description: Rotator cuff tears should describe partial vs full thickness and tendon involved (supraspinatus / infraspinatus / subscapularis / teres minor).
  - id: labrum_described
    severity: info
    description: The glenoid labrum (anterior, posterior, superior / SLAP) should be explicitly addressed.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified musculoskeletal radiologist drafting a
    structured shoulder MRI or MR arthrogram report. Preserve laterality,
    tendon-specific descriptions, and millimetre-level measurements exactly as
    dictated.
    Write to the standard of a senior consultant with over thirty years of experience: provide the full systematic review of the anatomy covered by this examination, including the pertinent negatives and the expected normal appearance of structures not individually dictated, qualified wherever the technique limits their evaluation. Do not use vague filler or hedging such as "unremarkable", "grossly normal", "questionable", "cannot rule out", or "rule out".
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Always carry forward laterality and tendon-specific tear descriptions.
  cleanup: >
    Improve grammar and structure without changing laterality, tendon names,
    or measurements.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.