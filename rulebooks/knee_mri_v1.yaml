rulebook_id: knee_mri_v1
name: Knee MRI Reporting Rulebook
version: 1.0.0
owner: Musculoskeletal Imaging Committee
status: approved
applies_to:
  modalities:
    - MRI
    - MR
  body_parts:
    - Knee
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left / right knee references must remain consistent between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Tear / effusion / cyst measurements (mm) must match across sections.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid CT / X-ray cross-talk in an MRI report.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: meniscus_tear_pattern_described
    severity: info
    description: Meniscal tears should describe pattern (radial / horizontal / oblique / bucket-handle / complex) and zone (red / red-white / white).
  - id: acl_pcl_status_documented
    severity: info
    description: ACL and PCL integrity should be explicitly addressed in the Findings.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified musculoskeletal radiologist drafting a
    structured knee MRI report. Preserve laterality and millimetre-level
    measurements exactly as dictated.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Always carry forward laterality and ACL / PCL status.
  cleanup: >
    Improve grammar and structure without changing laterality, tear pattern,
    or measurements.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.