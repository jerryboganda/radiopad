rulebook_id: head_ct_trauma_v1
name: Non-Contrast Head CT for Trauma Reporting Rulebook
version: 1.0.1
owner: Neuroradiology Committee
status: approved
applies_to:
  modalities:
    - CT
  body_parts:
    - Head
    - Brain
  report_types:
    - trauma
    - emergent
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
    - Neurosurgery consult.
required_sections:
  - Indication
  - Technique
  - Findings
  - Impression
  - Recommendations
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left / right intracranial findings must remain consistent between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Hematoma thickness and midline shift measurements (mm) must match across sections.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: critical_result_language
    severity: blocker
    description: Acute haemorrhage, herniation, or midline shift findings require documented communication / escalation language.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_finding_language
    severity: info
    description: Alias of critical_result_language for trauma terminology — kept for documentation.
  - id: midline_shift_measured
    severity: info
    description: Any midline shift should be measured in millimetres.
  - id: gcs_documented
    severity: info
    description: When supplied by the ordering clinician, the Glasgow Coma Scale should appear in the Indication.
  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified neuroradiologist drafting a structured
    non-contrast head CT report for a trauma patient. Preserve laterality,
    hematoma thickness, midline shift in millimetres, and approved
    communication language exactly as dictated.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Always include critical-result communication language for any
    intracranial haemorrhage, herniation, or midline shift.
  cleanup: >
    Improve grammar and structure without changing laterality, measurements,
    or critical-result phrasing.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.