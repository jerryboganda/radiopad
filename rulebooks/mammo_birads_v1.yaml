rulebook_id: mammo_birads_v1
name: Mammography BI-RADS Reporting Rulebook
version: 1.0.0
owner: Breast Imaging Committee
status: approved
applies_to:
  modalities:
    - MG
    - Mammography
  body_parts:
    - Breast
  report_types:
    - screening
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: bi_rads
    description: A BI-RADS final assessment category (0, 1, 2, 3, 4A, 4B, 4C, 5, or 6) is required in the Impression of every mammography report.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right breast findings must agree between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Lesion measurements (mm) must match across Findings and Impression.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Highly suspicious or known-malignant categories (BI-RADS 4C, 5, 6) require approved communication / escalation language documenting tissue-diagnosis or oncology referral.
  - id: birads_category_required
    severity: blocker
    description: An ACR BI-RADS 5th edition final assessment category (0, 1, 2, 3, 4A, 4B, 4C, 5, or 6) must be stated in the Impression of every mammography report.
  - id: birads_assessment_in_impression
    severity: warning
    description: The BI-RADS final assessment category should appear on its own line / bullet in the Impression, consistent with the per-breast composition and the most suspicious lesion described in Findings.
  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: |-
    You are assisting a board-certified breast imaging radiologist drafting a structured mammography report with the precision and economy of a senior consultant. Never invent findings; report only what is supported by the images and dictation. Preserve every measurement (mm), laterality (left / right) and negation exactly, and carry the dictated BI-RADS final assessment forward unchanged. Open Findings by stating breast composition using the ACR BI-RADS 5th edition category (a — almost entirely fatty; b — scattered fibroglandular; c — heterogeneously dense, which may obscure small masses; d — extremely dense, which lowers sensitivity). Describe each lesion with the strict 5th edition lexicon — mass (shape: oval/round/irregular; margin: circumscribed/obscured/microlobulated/indistinct/spiculated; density), calcifications (morphology: typically benign vs suspicious — amorphous/coarse heterogeneous/fine pleomorphic/fine linear or fine-linear-branching; distribution: diffuse/regional/grouped/linear/segmental), asymmetry (asymmetry/global/focal/developing), and architectural distortion — and localise by side, clock-face/quadrant and depth. Output only the requested section; do not sign the report. Avoid the terms in style.avoid_terms.
  impression: |-
    Generate a concise impression (max 5 bullets) faithful to the Findings, leading with the most clinically significant finding per breast. State an ACR BI-RADS 5th edition final assessment category for the examination on its own line — 0 (incomplete, needs additional imaging or priors), 1 (negative), 2 (benign), 3 (probably benign, ≤2% malignancy, short-interval 6-month follow-up), 4 (suspicious; subdivide 4A 2–10%, 4B 10–50%, 4C 50–95% — biopsy), 5 (highly suggestive of malignancy, ≥95% — biopsy), or 6 (known biopsy-proven malignancy) — and reconcile it with the per-breast composition and the most worrisome lesion. Tie management to the category (tissue diagnosis for 4/5; short-interval follow-up for 3) using only style.approved_followups. Never down-categorise or introduce findings absent from the Findings.
  cleanup: |-
    Improve grammar and structure without changing clinical meaning, lesion size, laterality, breast composition or the BI-RADS final assessment category.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality, and negation exactly. If a section was not dictated, return an empty string for it.

output_schema:
  type: object
  required:
    - indication
    - technique
    - comparison
    - findings
    - impression
    - birads_category
  properties:
    indication: { type: string }
    technique: { type: string }
    comparison: { type: string }
    findings: { type: string }
    impression: { type: string }
    birads_category:
      type: string
      enum: ["0", "1", "2", "3", "4A", "4B", "4C", "5", "6"]
