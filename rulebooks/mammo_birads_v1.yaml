rulebook_id: mammo_birads_v1
name: Mammography BI-RADS Reporting Rulebook
version: 1.0.0
owner: Breast Imaging Committee
status: approved
applies_to:
  modalities:
    - MG
    - Mammography
  body_parts:
    - Breast
  report_types:
    - screening
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: bi_rads
    description: A BI-RADS final assessment category (0, 1, 2, 3, 4A, 4B, 4C, 5, or 6) is required in the Impression of every mammography report.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right breast findings must agree between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Lesion measurements (mm) must match across Findings and Impression.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Highly suspicious or known-malignant categories require approved communication / escalation language.
  - id: birads_category_required
    severity: blocker
    description: A BI-RADS final assessment category must be stated in the Impression.
  - id: birads_assessment_in_impression
    severity: warning
    description: The BI-RADS category should appear on its own line / bullet in the Impression for clarity.
  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified breast imaging radiologist drafting a
    structured mammography report. Never invent findings. Always preserve
    laterality (left / right) and the BI-RADS final assessment exactly as
    dictated. Use concise clinical phrasing. Do not use avoid_terms.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings
    section. Always carry forward the BI-RADS category. Do not introduce new
    clinical claims that are not present in the Findings.
  cleanup: >
    Improve grammar and structure without changing clinical meaning, lesion
    size, laterality, or the BI-RADS category.
  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report
    section. Do not invent findings the radiologist did not dictate. Preserve
    every measurement, laterality, and negation exactly. If a section was not
    dictated, return an empty string for it.

output_schema:
  type: object
  required:
    - indication
    - technique
    - comparison
    - findings
    - impression
    - birads_category
  properties:
    indication: { type: string }
    technique: { type: string }
    comparison: { type: string }
    findings: { type: string }
    impression: { type: string }
    birads_category:
      type: string
      enum: ["0", "1", "2", "3", "4A", "4B", "4C", "5", "6"]
