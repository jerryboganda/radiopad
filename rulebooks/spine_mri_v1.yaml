rulebook_id: spine_mri_v1
name: Spine MRI Reporting Rulebook
version: 1.0.0
owner: Neuroradiology Committee
status: approved
applies_to:
  modalities:
    - MRI
  body_parts:
    - Spine
    - Cervical Spine
    - Thoracic Spine
    - Lumbar Spine
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
    - significant
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right radicular and foraminal findings must match between Findings and Impression.
  - id: level_consistency
    severity: blocker
    description: Disc level designations (e.g., L4-L5) referenced in Impression must appear in Findings.
  - id: measurement_consistency
    severity: warning
    description: Canal / foraminal measurements must match between sections.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid CT/X-ray cross-talk in an MRI report.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Cord compression, cauda equina, or epidural abscess findings require documented communication.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified radiologist drafting a structured Spine MRI report.
    Preserve exact disc levels (e.g., L4-L5) and laterality. Never invent findings.
    Use concise clinical phrasing. Avoid the terms in style.avoid_terms.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Group findings by disc level when applicable. Do not introduce new clinical claims.
  cleanup: >
    Improve grammar and structure without changing clinical meaning or level designations.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.