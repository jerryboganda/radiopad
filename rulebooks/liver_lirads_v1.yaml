rulebook_id: liver_lirads_v1
name: Liver MRI / CT — LI-RADS Rulebook
version: 1.0.0
owner: Abdominal Imaging Committee
status: approved
applies_to:
  modalities:
    - MRI
    - MR
    - CT
  body_parts:
    - Liver
    - Abdomen
  report_types:
    - diagnostic
    - follow_up
    - screening
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend continued LI-RADS surveillance imaging in 6 months.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: li_rads
    description: For at-risk patients, a LI-RADS category (LR-1, LR-2, LR-3, LR-4, LR-5, LR-M, LR-TIV, LR-NC) is required in the Impression.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Lobe / segment laterality references must agree between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Observation size (mm) and segment must match between Findings and Impression.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: LR-5, LR-M, and LR-TIV findings require approved communication / escalation language.
  - id: lirads_category_required
    severity: warning
    description: Studies for HCC surveillance or suspected HCC must state a LI-RADS category in the Impression.
  - id: lirads_observation_size_required
    severity: warning
    description: Each described focal observation should include a maximum diameter in millimetres.
  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified abdominal radiologist drafting a
    structured liver LI-RADS report. Never invent findings. Preserve segment,
    observation size, and LI-RADS category exactly as dictated. Use concise
    clinical phrasing.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings
    section. Always carry forward the LI-RADS category, observation size, and
    segment localisation.
  cleanup: >
    Improve grammar and structure without changing clinical meaning, segment,
    observation size, or LI-RADS code.
  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report
    section. Do not invent findings the radiologist did not dictate. Preserve
    every measurement, laterality, and negation exactly. If a section was not
    dictated, return an empty string for it.

output_schema:
  type: object
  required:
    - indication
    - technique
    - comparison
    - findings
    - impression
    - lirads_category
  properties:
    indication: { type: string }
    technique: { type: string }
    comparison: { type: string }
    findings: { type: string }
    impression: { type: string }
    lirads_category:
      type: string
      enum: ["LR-1", "LR-2", "LR-3", "LR-4", "LR-5", "LR-M", "LR-TIV", "LR-NC"]
