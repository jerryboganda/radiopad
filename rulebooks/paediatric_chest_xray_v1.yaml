rulebook_id: paediatric_chest_xray_v1
name: Paediatric Chest X-Ray Reporting Rulebook
version: 1.1.0
owner: Paediatric Imaging Committee
status: approved
applies_to:
  modalities:
    - XR
    - Radiography
  body_parts:
    - Chest
  report_types:
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 4
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right lung findings must match impression.
  - id: measurement_consistency
    severity: warning
    description: Cardiothoracic ratio and tube/line position descriptions must match across sections.
  - id: negation_conflict
    severity: blocker
    description: Findings denials must not be asserted in impression.
  - id: modality_mismatch
    severity: warning
    description: Avoid CT/MRI cross-talk in a paediatric chest XR report unless explicitly comparing.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Tension pneumothorax, malposition of life-support tubes, or foreign body aspiration require approved communication/escalation language.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified paediatric radiologist drafting a structured
    paediatric chest X-ray report. Never invent findings. Always preserve laterality
    (left/right) and tube/line positions exactly as dictated. Write complete, precise clinical sentences appropriate for paediatric anatomy and provide the standard systematic review with pertinent negatives. Do not use vague filler or hedging such as "unremarkable", "grossly normal", "cannot rule out", "questionable", or "rule out".
  findings_to_impression: >
    Generate a concise impression (max 4 bullets) faithful to the Findings section. Do not
    introduce new clinical claims that are not present in the Findings. Highlight any
    misplaced ETT/NG/CVC and any pneumothorax or pneumomediastinum first.
  cleanup: >
    Improve grammar and structure without changing clinical meaning, line/tube positions,
    or measurements.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.