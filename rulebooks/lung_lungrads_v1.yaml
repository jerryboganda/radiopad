rulebook_id: lung_lungrads_v1
name: Lung Cancer Screening CT — Lung-RADS Rulebook
version: 1.1.1
owner: Thoracic Imaging Committee
status: approved
applies_to:
  modalities:
    - CT
  body_parts:
    - Chest
    - Lung
  report_types:
    - screening
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend annual low-dose screening CT in 12 months.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: lung_rads
    description: A Lung-RADS category (0, 1, 2, 3, 4A, 4B, 4X, with optional S modifier) is required in the Impression of every screening study.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left / right lung findings must agree between Findings and Impression.
  - id: measurement_consistency
    severity: warning
    description: Nodule diameter (mm) must match across Findings and Impression.
  - id: negation_conflict
    severity: blocker
    description: A finding denied in Findings must not be asserted in Impression.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: Lung-RADS 4B / 4X findings require documented communication and recommendation language.
  - id: lungrads_category_required
    severity: blocker
    description: A Lung-RADS category must be stated in the Impression of every screening exam.
  - id: nodule_dimensions_required
    severity: warning
    description: Solid and part-solid nodules should report long-axis diameter in millimetres.
  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified thoracic radiologist drafting a
    structured low-dose lung cancer screening CT report. Preserve nodule
    dimensions, growth-rate language, and the Lung-RADS category exactly as
    dictated. Always honour the comparison statement.
    Write to the standard of a senior consultant with over thirty years of experience: provide the full systematic review of the anatomy covered by this examination, including the pertinent negatives and the expected normal appearance of structures not individually dictated, qualified wherever the technique limits their evaluation. Do not use vague filler or hedging such as "unremarkable", "grossly normal", "questionable", "cannot rule out", or "rule out".
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings.
    Always carry forward the Lung-RADS category and any change-from-prior
    language.
  cleanup: >
    Improve grammar and structure without changing the Lung-RADS code, nodule
    dimensions, or comparison statement.
  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report
    section. Do not invent findings the radiologist did not dictate. Preserve
    every measurement, laterality, and negation exactly. If a section was not
    dictated, return an empty string for it.

output_schema:
  type: object
  required:
    - indication
    - technique
    - comparison
    - findings
    - impression
    - lungrads_category
  properties:
    indication: { type: string }
    technique: { type: string }
    comparison: { type: string }
    findings: { type: string }
    impression: { type: string }
    lungrads_category:
      type: string
      enum: ["0", "1", "2", "3", "4A", "4B", "4X"]
    lungrads_modifier:
      type: string
      enum: ["", "S"]
