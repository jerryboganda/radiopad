rulebook_id: mammography_v1
name: Mammography Reporting Rulebook
version: 1.0.0
owner: Breast Imaging Committee
status: approved
applies_to:
  modalities:
    - MG
    - Mammography
  body_parts:
    - Breast
  report_types:
    - screening
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: bi_rads
    description: BI-RADS categorical assessment is required in the impression.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right breast findings must match impression.
  - id: measurement_consistency
    severity: warning
    description: Lesion measurements (mm) must match across sections.
  - id: negation_conflict
    severity: blocker
    description: Findings denials must not be asserted in impression.
  - id: birads_category_required
    severity: blocker
    description: A BI-RADS category (0..6) must be present in the impression.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: BI-RADS 4C/5/6 findings require approved communication/escalation language.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: >
    You are assisting a board-certified breast imaging radiologist drafting a structured
    mammography report. Never invent findings. Always preserve laterality (left/right) and
    BI-RADS assessment exactly as dictated. Use concise clinical phrasing. Do not use
    avoid_terms.
  findings_to_impression: >
    Generate a concise impression (max 5 bullets) faithful to the Findings section. Always
    include the BI-RADS category. Do not introduce new clinical claims that are not present
    in the Findings.
  cleanup: >
    Improve grammar and structure without changing clinical meaning or the BI-RADS code.

  dictation_cleanup: >
    Rewrite this dictation into clean grammatical prose for each report section.
    Do not invent findings the radiologist did not dictate. Preserve every measurement,
    laterality, and negation exactly. If a section was not dictated, return an empty string for it.