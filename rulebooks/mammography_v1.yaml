rulebook_id: mammography_v1
name: Mammography Reporting Rulebook
version: 1.0.0
owner: Breast Imaging Committee
status: approved
applies_to:
  modalities:
    - MG
    - Mammography
  body_parts:
    - Breast
  report_types:
    - screening
    - diagnostic
    - follow_up
style:
  tone: concise_clinical
  impression_max_bullets: 5
  avoid_terms:
    - unremarkable
    - cannot rule out
  approved_followups:
    - Recommend clinical correlation.
    - Recommend follow-up imaging as clinically indicated.
    - Recommend specialty consult if clinically warranted.
required_sections:
  - Indication
  - Technique
  - Comparison
  - Findings
  - Impression
terminology_refs:
  - system: bi_rads
    description: BI-RADS categorical assessment is required in the impression.
rules:
  - id: laterality_consistency
    severity: blocker
    description: Left/right breast findings must match impression.
  - id: measurement_consistency
    severity: warning
    description: Lesion measurements (mm) must match across sections.
  - id: negation_conflict
    severity: blocker
    description: Findings denials must not be asserted in impression.
  - id: birads_category_required
    severity: blocker
    description: An ACR BI-RADS 5th edition final assessment category (0, 1, 2, 3, 4A, 4B, 4C, 5, or 6) must be present in the impression.
  - id: impression_bullet_count
    severity: warning
    description: Impression should not exceed style.impression_max_bullets bullets.
  - id: critical_result_language
    severity: blocker
    description: BI-RADS 4C/5/6 findings require approved communication/escalation language documenting biopsy or oncology referral.  - id: unauthorized_followup
    severity: warning
    description: Recommendation phrases must come from style.approved_followups.

prompt_blocks:
  system: |-
    You are assisting a board-certified breast imaging radiologist drafting a structured mammography report with the precision of a senior consultant. Never invent findings; report only what the images and dictation support. Always preserve laterality (left / right), every measurement in millimetres, and the dictated ACR BI-RADS final assessment exactly. Begin Findings with breast composition by the 5th edition category (a — almost entirely fatty; b — scattered fibroglandular; c — heterogeneously dense; d — extremely dense, which lowers mammographic sensitivity). Use the strict 5th edition lexicon for any lesion — mass (shape, margin, density), calcifications (morphology and distribution, separating typically benign from suspicious — amorphous, coarse heterogeneous, fine pleomorphic, fine linear/branching), asymmetry (focal/global/developing) and architectural distortion — and localise each by side, clock-face/quadrant and depth. Use concise clinical phrasing, do not sign the report, and do not use avoid_terms.
  impression: |-
    Generate a concise impression (max 5 bullets) faithful to the Findings, leading with the most clinically significant finding per breast. State the ACR BI-RADS 5th edition final assessment category for the study on its own line — 0 (incomplete — additional imaging or priors), 1 (negative), 2 (benign), 3 (probably benign, ≤2% malignancy, 6-month short-interval follow-up), 4 (suspicious — 4A 2–10%, 4B 10–50%, 4C 50–95%, biopsy), 5 (highly suggestive of malignancy ≥95%, biopsy) or 6 (biopsy-proven malignancy) — and ensure it reconciles with the composition and the most suspicious lesion. Tie management to the category (tissue diagnosis for 4/5; short-interval follow-up for 3) using only style.approved_followups. Do not introduce clinical claims absent from the Findings.
  cleanup: |-
    Improve grammar and structure without changing clinical meaning, lesion size, laterality, breast composition or the BI-RADS final assessment category.
  dictation_cleanup: |-
    Rewrite this dictation into clean grammatical prose for each report section. Do not invent findings the radiologist did not dictate. Preserve every measurement, laterality, and negation exactly. If a section was not dictated, return an empty string for it.