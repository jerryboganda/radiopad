services:
  radiopad-postgres:
    image: postgres:16-alpine
    container_name: radiopad-postgres
    restart: unless-stopped
    env_file:
      - ../../../.secrets.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radiopad}
      POSTGRES_USER: ${POSTGRES_USER:-radiopad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in ../.secrets.env}
    volumes:
      - radiopad_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - radiopad

  radiopad-api:
    build:
      context: ../..
      dockerfile: deploy/vps/api.Dockerfile
    container_name: radiopad-api
    restart: unless-stopped
    depends_on:
      radiopad-postgres:
        condition: service_healthy
    env_file:
      - ../../../.secrets.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RADIOPAD_BIND: http://0.0.0.0:7457
      RADIOPAD_AUTH_SECRET: ${RADIOPAD_AUTH_SECRET:?set RADIOPAD_AUTH_SECRET}
      RADIOPAD_PUBLIC_WEB_URL: ${RADIOPAD_PUBLIC_WEB_URL:?set RADIOPAD_PUBLIC_WEB_URL}
      RADIOPAD_DEV_HEADERS: ${RADIOPAD_DEV_HEADERS:-0}
      RADIOPAD_TRUST_FORWARDED_FOR: ${RADIOPAD_TRUST_FORWARDED_FOR:-0}
      RADIOPAD_TRUSTED_PROXY_CIDRS: ${RADIOPAD_TRUSTED_PROXY_CIDRS:-}
      # SQLite database — change to a Postgres connection string for production scale
      ConnectionStrings__RadioPad: Data Source=/data/radiopad.db
      RADIOPAD_COLUMN_KEY_REF: env:RADIOPAD_COLUMN_KEK
      RADIOPAD_COLUMN_KEK: ${RADIOPAD_COLUMN_KEK:?set RADIOPAD_COLUMN_KEK}
      RADIOPAD_COLUMN_KEY_WRAPPED: ${RADIOPAD_COLUMN_KEY_WRAPPED:?set RADIOPAD_COLUMN_KEY_WRAPPED}
      RADIOPAD_RATE_LIMIT_IP_PER_MIN: "600"
      RADIOPAD_RATE_LIMIT_TENANT_PER_MIN: "5000"
      RADIOPAD_CLI_PROVIDER_TIMEOUT_MS: ${RADIOPAD_CLI_PROVIDER_TIMEOUT_MS:-60000}
      RADIOPAD_CLI_PROVIDER_ALLOWED_PATHS: ${RADIOPAD_CLI_PROVIDER_ALLOWED_PATHS:-}
      RADIOPAD_CLI_PROVIDER_ENV_ALLOWLIST: ${RADIOPAD_CLI_PROVIDER_ENV_ALLOWLIST:-}
      RADIOPAD_CODEX_CLI_ENABLED: ${RADIOPAD_CODEX_CLI_ENABLED:-0}
      RADIOPAD_OPENAI_COMPATIBLE_ALLOW_PHI: ${RADIOPAD_OPENAI_COMPATIBLE_ALLOW_PHI:-0}
      RADIOPAD_ENABLE_SWAGGER: ${RADIOPAD_ENABLE_SWAGGER:-0}
      # Email delivery via HTTPS REST API (bypasses DO SMTP block)
      RADIOPAD_EMAIL_PROVIDER: ${RADIOPAD_EMAIL_PROVIDER:-gmail}
      RADIOPAD_EMAIL_FROM: ${RADIOPAD_EMAIL_FROM:-}
      RADIOPAD_EMAIL_REPLY_TO: ${RADIOPAD_EMAIL_REPLY_TO:-}
      # Gmail API OAuth2 credentials
      RADIOPAD_GMAIL_CLIENT_ID: ${RADIOPAD_GMAIL_CLIENT_ID:-}
      RADIOPAD_GMAIL_CLIENT_SECRET: ${RADIOPAD_GMAIL_CLIENT_SECRET:-}
      RADIOPAD_GMAIL_REFRESH_TOKEN: ${RADIOPAD_GMAIL_REFRESH_TOKEN:-}
      # For non-Gmail providers only:
      RADIOPAD_EMAIL_API_KEY: ${RADIOPAD_EMAIL_API_KEY:-}
    volumes:
      - ../../data:/data
    networks:
      - radiopad

  radiopad-web:
    build:
      context: ../..
      dockerfile: deploy/vps/web.Dockerfile
    container_name: radiopad-web
    restart: unless-stopped
    depends_on:
      radiopad-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RADIOPAD_WEB_PORT:-8093}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radiopad

volumes:
  radiopad_pgdata:
    name: radiopad_pgdata

networks:
  radiopad:
    name: radiopad_network
