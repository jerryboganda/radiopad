services:
  radiopad-postgres:
    image: postgres:16-alpine
    container_name: radiopad-postgres
    restart: unless-stopped
    env_file:
      - ../../../.secrets.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radiopad}
      POSTGRES_USER: ${POSTGRES_USER:-radiopad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in ../.secrets.env}
    volumes:
      - radiopad_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - radiopad

  radiopad-api:
    build:
      context: ../..
      dockerfile: deploy/vps/api.Dockerfile
    container_name: radiopad-api
    restart: unless-stopped
    depends_on:
      radiopad-postgres:
        condition: service_healthy
    env_file:
      - ../../../.secrets.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RADIOPAD_BIND: http://0.0.0.0:7457
      RADIOPAD_AUTH_SECRET: ${RADIOPAD_AUTH_SECRET:?set RADIOPAD_AUTH_SECRET}
      RADIOPAD_PUBLIC_WEB_URL: ${RADIOPAD_PUBLIC_WEB_URL:?set RADIOPAD_PUBLIC_WEB_URL}
      RADIOPAD_DEV_HEADERS: ${RADIOPAD_DEV_HEADERS:-0}
      RADIOPAD_TRUST_FORWARDED_FOR: ${RADIOPAD_TRUST_FORWARDED_FOR:-0}
      RADIOPAD_TRUSTED_PROXY_CIDRS: ${RADIOPAD_TRUSTED_PROXY_CIDRS:-}
      # SQLite database — change to a Postgres connection string for production scale
      ConnectionStrings__RadioPad: Data Source=/data/radiopad.db
      RADIOPAD_COLUMN_KEY_REF: env:RADIOPAD_COLUMN_KEK
      RADIOPAD_COLUMN_KEK: ${RADIOPAD_COLUMN_KEK:?set RADIOPAD_COLUMN_KEK}
      RADIOPAD_COLUMN_KEY_WRAPPED: ${RADIOPAD_COLUMN_KEY_WRAPPED:?set RADIOPAD_COLUMN_KEY_WRAPPED}
      RADIOPAD_RATE_LIMIT_IP_PER_MIN: "600"
      RADIOPAD_RATE_LIMIT_TENANT_PER_MIN: "5000"
      RADIOPAD_CLI_PROVIDER_TIMEOUT_MS: ${RADIOPAD_CLI_PROVIDER_TIMEOUT_MS:-60000}
      # Gemini CLI provider binary is baked into the api image at /usr/local/bin/gemini
      # (see api.Dockerfile). Default the pin + allowlist so production's default-deny
      # CLI binary check permits it out of the box; override both via .secrets.env.
      RADIOPAD_GEMINI_BIN: ${RADIOPAD_GEMINI_BIN:-/usr/local/bin/gemini}
      RADIOPAD_CLI_PROVIDER_ALLOWED_PATHS: ${RADIOPAD_CLI_PROVIDER_ALLOWED_PATHS:-/usr/local/bin/gemini}
      RADIOPAD_CLI_PROVIDER_ENV_ALLOWLIST: ${RADIOPAD_CLI_PROVIDER_ENV_ALLOWLIST:-}
      RADIOPAD_CODEX_CLI_ENABLED: ${RADIOPAD_CODEX_CLI_ENABLED:-0}
      RADIOPAD_ENABLE_SWAGGER: ${RADIOPAD_ENABLE_SWAGGER:-0}
      # Email delivery via HTTPS REST API (bypasses DO SMTP block)
      RADIOPAD_EMAIL_PROVIDER: ${RADIOPAD_EMAIL_PROVIDER:-gmail}
      RADIOPAD_EMAIL_FROM: ${RADIOPAD_EMAIL_FROM:-}
      RADIOPAD_EMAIL_REPLY_TO: ${RADIOPAD_EMAIL_REPLY_TO:-}
      # Gmail API OAuth2 credentials
      RADIOPAD_GMAIL_CLIENT_ID: ${RADIOPAD_GMAIL_CLIENT_ID:-}
      RADIOPAD_GMAIL_CLIENT_SECRET: ${RADIOPAD_GMAIL_CLIENT_SECRET:-}
      RADIOPAD_GMAIL_REFRESH_TOKEN: ${RADIOPAD_GMAIL_REFRESH_TOKEN:-}
      # For non-Gmail providers only:
      RADIOPAD_EMAIL_API_KEY: ${RADIOPAD_EMAIL_API_KEY:-}
      # ── UBAG AI-orchestrator wiring (2026-07-11) ─────────────────────────
      # Codified so a compose re-up can never silently sever the integration
      # (values live in ../.secrets.env; harmless empty when UBAG is absent).
      # Reaching the gateway by container DNS additionally requires the
      # docker-compose.ubag.yml overlay, which joins the shared UBAG network.
      RADIOPAD_UBAG_BASE_URL: ${RADIOPAD_UBAG_BASE_URL:-}
      RADIOPAD_UBAG_AUTH_SECRET: ${RADIOPAD_UBAG_AUTH_SECRET:-}
      RADIOPAD_UBAG_AUTH_SECRET_REF: ${RADIOPAD_UBAG_AUTH_SECRET_REF:-}
      RADIOPAD_UBAG_AUTH_HEADER: ${RADIOPAD_UBAG_AUTH_HEADER:-}
      RADIOPAD_UBAG_AUTH_SCHEME: ${RADIOPAD_UBAG_AUTH_SCHEME:-}
      RADIOPAD_UBAG_API_VERSION: ${RADIOPAD_UBAG_API_VERSION:-}
      RADIOPAD_UBAG_ALLOWED_TARGETS: ${RADIOPAD_UBAG_ALLOWED_TARGETS:-}
      RADIOPAD_UBAG_ORDERED_TARGETS: ${RADIOPAD_UBAG_ORDERED_TARGETS:-}
      RADIOPAD_UBAG_TIMEOUT_MS: ${RADIOPAD_UBAG_TIMEOUT_MS:-}
      # Operator inbox for UBAG login-lost / gateway-down alert emails.
      RADIOPAD_OPERATOR_ALERT_EMAIL: ${RADIOPAD_OPERATOR_ALERT_EMAIL:-}
    volumes:
      - ../../data:/data
    # radiopad-web gates on service_healthy, so the API must define a
    # healthcheck — without one compose refuses to start the dependent.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:7457/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - radiopad

  radiopad-web:
    build:
      context: ../..
      dockerfile: deploy/vps/web.Dockerfile
    container_name: radiopad-web
    restart: unless-stopped
    depends_on:
      radiopad-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RADIOPAD_WEB_PORT:-8093}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radiopad

  # Marketing landing site (Astro static, `marketing/`). Serves the public
  # root domain; also proxies /api /ws /saml /scim to radiopad-api so already-
  # installed desktop clients (which default to the root domain) keep working
  # even after the admin app itself moves to an admin.* subdomain — see
  # deploy/vps/README.md.
  radiopad-marketing:
    build:
      context: ../..
      dockerfile: deploy/vps/marketing.Dockerfile
    container_name: radiopad-marketing
    restart: unless-stopped
    depends_on:
      radiopad-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RADIOPAD_MARKETING_PORT:-8094}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radiopad

volumes:
  radiopad_pgdata:
    name: radiopad_pgdata

networks:
  radiopad:
    name: radiopad_network
