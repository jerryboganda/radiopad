name: desktop-stt-smoke

# Validates the REAL on-device STT engine on Windows: loads the sherpa-onnx
# native library + the downloaded NVIDIA Parakeet model and transcribes a real
# speech WAV. The model is cached by SHA-256 so only the first run pays the
# download.
#
# The gating tests no-op in normal Linux CI (no model, no win-x64 native lib).
# Here the job sets RADIOPAD_STT_SMOKE_REQUIRE=1, so a mis-wired model path
# FAILS the job instead of silently passing as a skipped no-op.

on:
  workflow_dispatch:
  push:
    paths:
      - 'backend/RadioPad.Api/src/RadioPad.Infrastructure/Providers/Local/**'
      - 'backend/RadioPad.Api/src/RadioPad.Infrastructure/Audio/**'
      - 'backend/RadioPad.Api/tests/RadioPad.Api.Tests/Providers/**'
      - '.github/workflows/desktop-stt-smoke.yml'

permissions:
  contents: read

jobs:
  smoke:
    name: on-device STT engine smoke (windows)
    runs-on: windows-latest
    env:
      RADIOPAD_STT_SMOKE_REQUIRE: '1'
      # Exercise the OPTIMIZED config end-to-end (these are also the code defaults).
      RADIOPAD_STT_DECODING: modified_beam_search
      RADIOPAD_STT_MAX_ACTIVE_PATHS: '4'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache Parakeet model
        id: model
        uses: actions/cache@v4
        with:
          path: stt-model
          key: stt-parakeet-tdt-0.6b-v3-int8-5793d0fd

      - name: Download + verify + extract model
        if: steps.model.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-nemo-parakeet-tdt-0.6b-v3-int8.tar.bz2"
          curl -fL "$url" -o model.tar.bz2
          echo "5793d0fd397c5778d2cf2126994d58e9d56b1be7c04d13c7a15bb1b4eafb16bf  model.tar.bz2" | sha256sum -c -
          mkdir -p stt-model
          tar -xf model.tar.bz2 -C stt-model

      - name: Locate a real speech WAV from the bundle
        shell: bash
        run: |
          set -euo pipefail
          root="$(pwd)/stt-model"
          # Prefer an English sample; else any WAV.
          wav="$(find "$root" -iname 'en*.wav' | head -n1)"
          test -n "$wav" || wav="$(find "$root" -iname '*.wav' | head -n1)"
          test -n "$wav" || { echo "no sample WAV in Parakeet bundle"; exit 1; }
          echo "RADIOPAD_STT_SMOKE_WAV=$(cygpath -w "$wav")" >> "$GITHUB_ENV"
          echo "using sample WAV (absolute): $wav"

      - name: Wire radiology hotwords if the bundle ships a BPE vocab
        shell: bash
        run: |
          set -euo pipefail
          vocab="$(find stt-model -iname 'bpe.vocab' -o -iname '*.vocab' | head -n1 || true)"
          hot="$(pwd)/backend/RadioPad.Api/src/RadioPad.Infrastructure/Providers/Local/radiology-hotwords.txt"
          if [ -n "$vocab" ]; then
            echo "RADIOPAD_STT_HOTWORDS_FILE=$(cygpath -w "$hot")" >> "$GITHUB_ENV"
            echo "hotword biasing wired (BPE vocab: $vocab)"
          else
            echo "no BPE vocab in Parakeet bundle -> hotwords skipped; beam search still verified"
          fi

      - name: Run Parakeet engine smoke (real native lib + model)
        shell: bash
        working-directory: backend/RadioPad.Api
        env:
          RADIOPAD_STT_SMOKE_MODEL_DIR: ${{ github.workspace }}\stt-model
        run: |
          dotnet test --filter "FullyQualifiedName~SttEngineSmokeTests" -c Release

  medasr:
    # MedASR is the DEFAULT primary engine (decision D2), so it needs the same real-engine proof as
    # Parakeet. Its own job so the two models cache independently and run in parallel.
    #
    # This job exists because a local runtime check caught what compile-checking could not: MedASR
    # emits `{period}` / `[FINDINGS]` markup rather than plain punctuation, which would otherwise
    # have reached signed reports verbatim. The smoke test asserts on clinical content, so a future
    # bundle that changes that markup fails here instead of in a radiologist's report.
    name: on-device MedASR engine smoke (windows)
    runs-on: windows-latest
    env:
      RADIOPAD_STT_SMOKE_REQUIRE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache MedASR bundle
        id: medasr-model
        uses: actions/cache@v4
        with:
          path: medasr-model
          key: stt-medasr-ctc-en-int8-2c20f032

      - name: Download + verify the MedASR CTC bundle
        if: steps.medasr-model.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          base="https://huggingface.co/csukuangfj/sherpa-onnx-medasr-ctc-en-int8-2025-12-25/resolve/main"
          mkdir -p medasr-model/test_wavs
          # Public + ungated (HF API gated:false) — an anonymous download, no token needed.
          curl -fL "$base/model.int8.onnx" -o medasr-model/model.int8.onnx
          curl -fL "$base/tokens.txt"      -o medasr-model/tokens.txt
          # The bundle's own radiology dictation sample, so the assertions are about real speech.
          curl -fL "$base/test_wavs/0.wav" -o medasr-model/test_wavs/0.wav
          # Pins must match LocalSttModels.MedAsr* exactly — a drifted upstream file fails here
          # rather than silently shipping an unverified model to the provisioner.
          echo "2c20f03265ee6144c566fd18b0f7bbb4f0d005d11ce9440dd641920210f4c33a  medasr-model/model.int8.onnx" | sha256sum -c -
          echo "f762591b44f3672e4b5b464d89912d43e12510082a8471c5fb85ec03dcb9d794  medasr-model/test_wavs/0.wav" | sha256sum -c -

      - name: Run MedASR engine smoke (real native lib + model)
        shell: bash
        working-directory: backend/RadioPad.Api
        env:
          RADIOPAD_MEDASR_SMOKE_MODEL_DIR: ${{ github.workspace }}\medasr-model
        run: |
          dotnet test --filter "FullyQualifiedName~MedAsrEngineSmokeTests" -c Release
