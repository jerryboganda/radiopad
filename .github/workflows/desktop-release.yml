name: desktop-release

# DESK-001 — Tauri auto-update signed-release pipeline.
#
# Trigger: manual dispatch by release engineering. It does NOT run on every
# push and does NOT run on PRs. Signing material is sourced through GitHub OIDC
# → an AWS IAM role with KMS-decrypt + SSM-read on
# `/radiopad/desktop/signing/*` and nothing else.

on:
  workflow_dispatch:
    inputs:
      signing_role_arn:
        description: AWS IAM role ARN allowed to read desktop signing material
        required: true
        type: string

# OIDC token + read-only checkout. No write permissions.
permissions:
  id-token: write
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop-sign-and-publish:
    name: build & sign (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing role configuration
        shell: bash
        env:
          SIGNING_ROLE_ARN: ${{ inputs.signing_role_arn }}
        run: |
          set -euo pipefail
          if [ -z "$SIGNING_ROLE_ARN" ]; then
            echo "RADIOPAD_DESKTOP_SIGNING_ROLE_ARN secret is required for desktop releases." >&2
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.signing_role_arn }}
          aws-region: us-east-1
          role-session-name: gh-desktop-release-${{ github.run_id }}

      - name: Fetch ed25519 signing material from SSM
        shell: bash
        run: |
          set -euo pipefail
          PRIV=$(aws ssm get-parameter \
            --name /radiopad/desktop/signing/private-key \
            --with-decryption --query Parameter.Value --output text)
          PASS=$(aws ssm get-parameter \
            --name /radiopad/desktop/signing/private-key-password \
            --with-decryption --query Parameter.Value --output text)
          PUB=$(aws ssm get-parameter \
            --name /radiopad/desktop/signing/public-key \
            --query Parameter.Value --output text)
          echo "::add-mask::$PRIV"
          echo "::add-mask::$PASS"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__EOF__"
            echo "$PRIV"
            echo "__EOF__"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$PASS"
            echo "TAURI_SIGNING_PUBLIC_KEY=$PUB"
          } >> "$GITHUB_ENV"

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux bundler deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build frontend (static export)
        run: pnpm --filter @radiopad/frontend build

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: cargo tauri build (signed)
        working-directory: desktop
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ env.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Upload bundle + signature
        uses: actions/upload-artifact@v4
        with:
          name: radiopad-desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            !desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.pdb
          if-no-files-found: error
          retention-days: 30
