name: desktop-bundle

# PRD DESK-010..014 — Tauri 2 desktop bundle pipeline. Triggered on tag push
# (v*.*.*) or manually. Builds the Next.js export, then `cargo tauri build`
# on Windows. The desktop app is WINDOWS-ONLY (see the matrix comment below).
# Signing is gated on the secrets being present so forks still build (unsigned).
#
# Required repository secrets (optional — bundle is unsigned without them):
#   TAURI_PRIVATE_KEY              Tauri 2 updater signing key (Ed25519).
#   TAURI_KEY_PASSWORD             Password for the updater key.
#   WINDOWS_CERTIFICATE_PFX_BASE64 Authenticode .pfx (base64, code-signing).
#   WINDOWS_CERTIFICATE_PASSWORD   Password for the Authenticode .pfx.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  bundle:
    name: bundle ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PLATFORM RULE (operator decision, 2026-07-20): the desktop app targets
        # WINDOWS ONLY. macOS and Linux are deliberately out of scope — they roughly
        # doubled every release's wall-clock and produced installers nobody was going
        # to run. The mobile companion (Android + iOS) is unaffected and still builds
        # in mobile-bundle.yml.
        #
        # To bring a platform back: add it here, restore its build/sign steps (see the
        # git history of this file for the Linux GPG and macOS notarisation steps),
        # re-add its bundle target in desktop/src-tauri/tauri.conf.json, and re-add its
        # verify job in desktop-installer-verify.yml. Also update CLAUDE.md, which
        # states this rule.
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      # Mirror secret presence into job env so step-level `if:` can read it
      # without referencing the `secrets` context.
      WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve sidecar target triple
        id: triple
        shell: bash
        run: |
          # Windows-only by the platform rule at the top of this file. Anything else is a
          # matrix entry someone added without restoring the rest of that platform's steps,
          # so fail loudly rather than publish a sidecar for a target we do not ship.
          case "${{ matrix.os }}" in
            windows-latest) echo "rid=win-x64" >> $GITHUB_OUTPUT; echo "triple=x86_64-pc-windows-msvc" >> $GITHUB_OUTPUT ;;
            *) echo "::error::unsupported desktop target '${{ matrix.os }}' — the desktop app is Windows-only (see the matrix comment)"; exit 1 ;;
          esac

      - name: Publish .NET backend sidecar
        shell: bash
        run: |
          dotnet publish backend/RadioPad.Api/src/RadioPad.Api/RadioPad.Api.csproj \
            -c Release -r ${{ steps.triple.outputs.rid }} --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/sidecar
          mkdir -p desktop/src-tauri/binaries
          cp publish/sidecar/RadioPad.Api.exe "desktop/src-tauri/binaries/radiopad-api-${{ steps.triple.outputs.triple }}.exe"

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend (desktop surface)
        working-directory: frontend
        # Desktop ships the full reporting product; build the `desktop` surface so
        # frontend/out-desktop (tauri.conf frontendDist) exists. `cargo tauri build`
        # also re-runs this via beforeBuildCommand, but building it here first keeps
        # the step self-describing and independent of that hook.
        run: pnpm build:desktop

      # --- Windows Authenticode signing (if cert present) -----------------
      - name: Decode Windows certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE_PFX_BASE64 != ''
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP/codesign.pfx", $bytes)
          echo "WINDOWS_CERTIFICATE_PATH=$env:RUNNER_TEMP/codesign.pfx" >> $env:GITHUB_ENV

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build Tauri bundle
        working-directory: desktop
        env:
          # NOTE: the desktop no longer carries a UBAG proxy token. AI runs
          # through the hosted production API (server-side UBAG), and the bundled
          # sidecar is on-device STT only — so RADIOPAD_DESKTOP_PROXY_TOKEN is no
          # longer baked in.
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Windows
          WINDOWS_CERTIFICATE: ${{ runner.temp }}\codesign.pfx
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        # Unsigned bundle: do not emit updater artifacts. Tauri requires
        # TAURI_SIGNING_PRIVATE_KEY to sign them, which this pipeline does not
        # provide (the signed pipeline is desktop-release.yml). createUpdaterArtifacts
        # stays enabled in tauri.conf.json for that signed release path.
        run: |
          cargo tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      # Launch the built shell and fail the build if it panics on startup
      # (e.g. PluginInitialization config errors). Tolerates a clean early exit
      # caused by the runner's headless webview so it does not false-fail.
      - name: Smoke-test desktop binary (no-panic launch)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "desktop/src-tauri/target/release/radiopad-desktop.exe"
          if (-not (Test-Path $exe)) { Write-Error "built exe not found: $exe"; exit 1 }
          $err = "$env:RUNNER_TEMP\smoke_err.txt"
          Write-Host "Launching $exe ..."
          $p = Start-Process -FilePath $exe -RedirectStandardError $err -PassThru
          Start-Sleep -Seconds 12
          $stderr = (Get-Content $err -Raw -ErrorAction SilentlyContinue)
          if ($p.HasExited) {
            Write-Host "Process exited early. ExitCode=$($p.ExitCode)"
            Write-Host "STDERR:`n$stderr"
            if ($stderr -match 'panicked|PluginInitialization|error while running') {
              Write-Error "Desktop shell PANICKED on launch"; exit 1
            }
            Write-Host "Exited without a panic (likely headless webview on the runner); not failing."
            # Say so loudly rather than let a green tick imply cover this run did not provide.
            Write-Host "::warning::shell exited before the sidecar could be probed - ON-DEVICE ENGINES NOT VERIFIED in this run"
          } else {
            Write-Host "Desktop shell stayed alive 12s with no panic - launch OK."

            # The packaged app is running, so the sidecar it supervises must be serving. Everything
            # before this point tested the sidecar we started OURSELVES; this is the only check that
            # proves Tauri spawns it, with the right environment, from the real installed binary.
            # That distinction is not academic: MedGemma was provisioned, pinned and CI-smoke-tested
            # while unreachable in every shipped build, because nothing ever asked the app itself.
            $ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                $r = Invoke-WebRequest -Uri 'http://127.0.0.1:7457/api/health/ready' -UseBasicParsing -TimeoutSec 3
                if ($r.StatusCode -eq 200) { $ready = $true; break }
              } catch { Start-Sleep -Seconds 2 }
            }
            if (-not $ready) {
              Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
              Write-Error "the desktop shell never brought up its sidecar on 127.0.0.1:7457 - on-device dictation is dead in this build"
              exit 1
            }
            Write-Host "sidecar is ready (spawned by the packaged app)"

            # MedASR must be offered by the model manager the app talks to.
            $models = (Invoke-WebRequest -Uri 'http://127.0.0.1:7457/api/local-models' -UseBasicParsing -TimeoutSec 10).Content
            if ($models -notmatch 'medasr') {
              Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
              Write-Error "the app's sidecar does not offer MedASR - the default on-device engine is unreachable"
              exit 1
            }
            Write-Host "MedASR offered by the app's own sidecar"

            # MedGemma: 503 means the capability flag never reached the backend. A 502 (no model on
            # this runner) proves the request got past the gate and into the pipeline, which is the
            # property under test here - inference itself is covered by the model-bearing smokes.
            $code = 0
            try {
              $resp = Invoke-WebRequest -Uri 'http://127.0.0.1:7457/api/dictation/draft-local' `
                -Method POST -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30 `
                -Body '{"rawDictation":"CT chest. No pneumothorax.","modality":"CT","bodyPart":"Chest"}'
              $code = $resp.StatusCode
            } catch { $code = $_.Exception.Response.StatusCode.value__ }
            Write-Host "draft-local -> HTTP $code"
            if ($code -eq 503) {
              Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
              Write-Error "503 formatter_unavailable from the PACKAGED app - MedGemma is unreachable to end users"
              exit 1
            }
            Write-Host "MedGemma on-device formatting is reachable from the packaged app (HTTP $code)"

            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: radiopad-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

      # --- Windows Authenticode post-sign (defensive) ----------------------
      # `cargo tauri build` already invokes signtool when WINDOWS_CERTIFICATE
      # env vars are present. This step explicitly re-signs the produced
      # .exe / .msi as a belt-and-braces measure and adds an RFC-3161
      # timestamp so signatures keep verifying after the cert expires.
      - name: Authenticode sign (Windows)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE_PATH != ''
        env:
          WINDOWS_CERTIFICATE_PATH: ${{ env.WINDOWS_CERTIFICATE_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } |
            Select-Object -First 1).FullName
          if (-not $signtool) {
            Write-Warning "signtool.exe not found; skipping post-sign"
            exit 0
          }
          Get-ChildItem desktop/src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi |
            ForEach-Object {
              & $signtool sign /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
                /f $env:WINDOWS_CERTIFICATE_PATH /p $env:WINDOWS_CERTIFICATE_PASSWORD $_.FullName
            }

      - name: Upload signed artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radiopad-${{ matrix.os }}-signed
          path: |
            desktop/src-tauri/target/release/bundle/**/*.asc
          if-no-files-found: ignore

  # --- MSI install + renderer-driven E2E --------------------------------------------------
  #
  # Closes the last §8b verification gap: "no CI installs the MSI and drives the UI". This job
  # installs the actual .msi produced above, pre-places the pinned on-device models where the
  # sidecar expects them (%LOCALAPPDATA%\com.radiopad.desktop — so the UI's Format action runs
  # the REAL MedGemma, not the 502 fail-safe), then drives the installed app's renderer over
  # the WebView2 devtools protocol: login (including the mandatory TOTP enrollment, computed
  # from the secret the UI shows) → report → dictation draft panel → on-device format → apply
  # → MICROPHONE dictation (Chromium's fake audio device plays the MedASR bundle's radiology
  # sample into the real HQ mic button; the decoded transcript must land in the focused
  # section and every /api/stt/transcribe response must come from MedASR).
  # scripts/desktop-msi-e2e.mjs is the driver — dependency-free Node 22, raw CDP.
  #
  # The webview uses the bundled sidecar as its data backend (RADIOPAD_BACKEND=loopback, which
  # the shipped CSP allows), so the whole flow is on-device: no cloud calls, no secrets. The
  # sidecar is pre-started by the script with a bootstrap secret + throwaway SQLite DB and the
  # shell ADOPTS it (sidecar_manager's single-instance guard) — Tauri-spawning its own sidecar
  # is separately covered by the launch smoke in the bundle job.
  #
  # `release` depends on this job: a build whose installed product cannot complete a dictation
  # draft through its own UI must not be published to the auto-updater.
  msi-e2e:
    name: install MSI + drive the renderer
    needs: bundle
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      MEDGEMMA_SHA: b31becdf4f39561800505514cce67681604fe449d04dd35c8c92fd7848c6d7bd
      LLAMA_TAG: b10068
      LLAMA_WIN_SHA: 01d5f30876acfb4a0be59396710f450213495c7181d8fbcce2fad045835ceb89
      MEDASR_SHA: 2c20f03265ee6144c566fd18b0f7bbb4f0d005d11ce9440dd641920210f4c33a
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # global WebSocket + fetch — the CDP driver has zero npm deps

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: radiopad-windows-latest
          path: artifacts

      # Model/runtime downloads are cached and the MedGemma/MedASR keys deliberately match the
      # ubuntu smoke workflows' keys — the blobs are platform-independent, so a weekly
      # offline-formatter-smoke run keeps this job's 2.5 GB restore warm.
      - name: Cache MedGemma GGUF
        id: medgemma
        uses: actions/cache@v4
        with:
          path: medgemma
          key: medgemma-1.5-4b-q4-${{ env.MEDGEMMA_SHA }}

      - name: Download + verify MedGemma
        if: steps.medgemma.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force medgemma | Out-Null
          curl.exe -fL --retry 5 --retry-all-errors -C - `
            "https://huggingface.co/unsloth/medgemma-1.5-4b-it-GGUF/resolve/main/medgemma-1.5-4b-it-Q4_K_M.gguf" `
            -o medgemma/medgemma-1.5-4b-it-Q4_K_M.gguf
          if ($LASTEXITCODE -ne 0) { throw "MedGemma download failed" }
          $h = (Get-FileHash -Algorithm SHA256 medgemma/medgemma-1.5-4b-it-Q4_K_M.gguf).Hash
          if ($h -ine $env:MEDGEMMA_SHA) { throw "MedGemma SHA mismatch: $h" }

      - name: Cache MedASR bundle
        id: medasr
        uses: actions/cache@v4
        with:
          path: medasr-model
          key: stt-medasr-ctc-en-int8-2c20f032

      - name: Download + verify MedASR
        if: steps.medasr.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force medasr-model/test_wavs | Out-Null
          $base = "https://huggingface.co/csukuangfj/sherpa-onnx-medasr-ctc-en-int8-2025-12-25/resolve/main"
          curl.exe -fL "$base/model.int8.onnx" -o medasr-model/model.int8.onnx
          if ($LASTEXITCODE -ne 0) { throw "MedASR model download failed" }
          curl.exe -fL "$base/tokens.txt" -o medasr-model/tokens.txt
          if ($LASTEXITCODE -ne 0) { throw "MedASR tokens download failed" }
          # The sample WAV is NOT best-effort here: the E2E's microphone phase plays it as
          # the fake capture device, so a missing file must fail now, not mid-drive.
          curl.exe -fL "$base/test_wavs/0.wav" -o medasr-model/test_wavs/0.wav
          if ($LASTEXITCODE -ne 0) { throw "MedASR sample wav download failed" }
          $h = (Get-FileHash -Algorithm SHA256 medasr-model/model.int8.onnx).Hash
          if ($h -ine $env:MEDASR_SHA) { throw "MedASR SHA mismatch: $h" }

      - name: Cache llama-server runtime (windows)
        id: llama
        uses: actions/cache@v4
        with:
          path: llama-runtime-win
          key: llama-server-${{ env.LLAMA_TAG }}-windows-x64

      - name: Download + verify llama-server
        if: steps.llama.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Pin matches LocalRuntimes.LlamaServerArchive() for Windows. The WHOLE zip is kept:
          # llama-server.exe is a 9 KB stub over llama-server-impl.dll + ggml-cpu-*.dll backends.
          curl.exe -fL --retry 5 --retry-all-errors `
            "https://github.com/ggml-org/llama.cpp/releases/download/$env:LLAMA_TAG/llama-$env:LLAMA_TAG-bin-win-cpu-x64.zip" `
            -o llama.zip
          if ($LASTEXITCODE -ne 0) { throw "llama-server download failed" }
          $h = (Get-FileHash -Algorithm SHA256 llama.zip).Hash
          if ($h -ine $env:LLAMA_WIN_SHA) { throw "llama-server SHA mismatch: $h" }
          Expand-Archive llama.zip -DestinationPath llama-runtime-win
          Remove-Item llama.zip

      - name: Place models + runtime where the sidecar resolves them
        shell: pwsh
        run: |
          # Mirrors LocalSttModels.ResolveModelDir / LocalRuntimes.ResolveRuntimeDir exactly —
          # the script later asserts the sidecar reports these as downloaded, so a layout drift
          # fails loudly rather than silently exercising the 502 path.
          $root = Join-Path $env:LOCALAPPDATA 'com.radiopad.desktop'
          New-Item -ItemType Directory -Force "$root/models/medgemma-1.5-4b-q4" | Out-Null
          Copy-Item medgemma/medgemma-1.5-4b-it-Q4_K_M.gguf "$root/models/medgemma-1.5-4b-q4/"
          New-Item -ItemType Directory -Force "$root/models/medasr-ctc-en-int8/test_wavs" | Out-Null
          Copy-Item medasr-model/model.int8.onnx "$root/models/medasr-ctc-en-int8/"
          Copy-Item medasr-model/tokens.txt "$root/models/medasr-ctc-en-int8/"
          if (Test-Path medasr-model/test_wavs/0.wav) {
            Copy-Item medasr-model/test_wavs/0.wav "$root/models/medasr-ctc-en-int8/test_wavs/"
          }
          New-Item -ItemType Directory -Force "$root/runtimes/llama-server-b10068" | Out-Null
          Copy-Item -Recurse -Force llama-runtime-win/* "$root/runtimes/llama-server-b10068/"

      - name: Install the MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem artifacts -Recurse -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) { throw 'No MSI in the bundle artifact' }
          Write-Host "Installing $($msi.FullName)"
          $p = Start-Process msiexec -ArgumentList '/i', "`"$($msi.FullName)`"", '/qn', '/norestart', '/l*v', "$env:RUNNER_TEMP\msi-install.log" -Wait -PassThru
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            Get-Content "$env:RUNNER_TEMP\msi-install.log" -Tail 60
            throw "msiexec /i exited $($p.ExitCode)"
          }
          echo "RADIOPAD_E2E_MSI=$($msi.FullName)" >> $env:GITHUB_ENV

      - name: Drive the installed app end to end
        shell: pwsh
        env:
          RADIOPAD_E2E_OUT: ${{ runner.temp }}/e2e-out
          # On tag builds this job gates the release, so the script's headless-webview
          # tolerance is disabled — a renderer that never came up must FAIL, not warn.
          RADIOPAD_E2E_STRICT: ${{ startsWith(github.ref, 'refs/tags/') && '1' || '0' }}
          # The MedASR bundle's own radiology dictation sample, played by Chromium's fake
          # audio device so the REAL mic button records real speech (mandatory phase).
          RADIOPAD_E2E_MIC_WAV: ${{ github.workspace }}/medasr-model/test_wavs/0.wav
        run: node scripts/desktop-msi-e2e.mjs

      - name: Uninstall the MSI
        if: always()
        shell: pwsh
        run: |
          if ($env:RADIOPAD_E2E_MSI) {
            $p = Start-Process msiexec -ArgumentList '/x', "`"$env:RADIOPAD_E2E_MSI`"", '/qn', '/norestart' -Wait -PassThru
            if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) { throw "msiexec /x exited $($p.ExitCode)" }
          }

      - name: Upload E2E evidence (screenshots + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-e2e-evidence
          path: |
            ${{ runner.temp }}/e2e-out/**/*
            ${{ runner.temp }}/msi-install.log
          if-no-files-found: warn

  # --- Publish (single writer) ----------------------------------------------
  #
  # Attaching used to happen INSIDE the matrix, so both `bundle` jobs called
  # action-gh-release concurrently for the same tag. A draft release is not reliably
  # discoverable by tag, so when the two calls raced neither found the other's draft and
  # BOTH created one — v0.1.86 ended up with two empty drafts (ids …084 and …712, created
  # in the same second) and no assets attached to either. v0.1.80–v0.1.85 each got exactly
  # one release, so the race had simply been losing until API latency during a GitHub
  # incident changed the timing.
  #
  # One job, running after both bundles, is therefore the fix: exactly one writer creates
  # the release and uploads every artefact. Matrix jobs now only build and upload workflow
  # artefacts.
  release:
    name: attach installers to the draft release
    # msi-e2e gates publication: an installer whose UI cannot complete a dictation draft
    # must not reach the auto-updater.
    needs: [bundle, msi-e2e]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download every bundle artefact
        uses: actions/download-artifact@v4
        with:
          pattern: radiopad-*
          path: dist

      - name: List what will be attached
        shell: bash
        run: |
          set -euo pipefail
          echo "--- installers found ---"
          found=$(find dist -type f \( -name '*.msi' -o -name '*.exe' \) -print | tee /dev/stderr | wc -l)
          # An empty upload would create a release with no installers and let tauri-updater
          # publish a latest.json pointing at nothing — worse than failing here.
          if [ "$found" -eq 0 ]; then
            echo "::error::no installers were produced by the bundle jobs; refusing to create an empty release"
            exit 1
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Keep the release out of GitHub's /releases/latest endpoint until
          # tauri-updater has attached the signed latest.json manifest. Publishing
          # an installer first creates a window where every installed client gets
          # a 404 and reports "Update failed".
          draft: true
          files: |
            dist/**/*.msi
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
