name: mobile-bundle
on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile/**'
      - 'frontend/**'
      - '.github/workflows/mobile-bundle.yml'

# PRD §15 — Capacitor Android + iOS bundles. The native projects are
# generated by `npx cap add` on the runner so we ship the same code path
# Capacitor users follow locally; only signing material differs (Apple
# Developer + Google Play credentials live in repo secrets).
jobs:
  android:
    runs-on: ubuntu-latest
    env:
      # Mirror secret presence into job env so `if: env.X != ''` works
      # without referencing the `secrets` context inside step `if:` blocks.
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: '9' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - name: Build frontend (mobile companion surface)
        run: |
          pnpm install --frozen-lockfile=false
          # Mobile ships the `mobile` surface only (companion: pairing + dictation),
          # which Capacitor consumes from frontend/out-mobile (see capacitor.config.ts).
          cd frontend && pnpm install --frozen-lockfile=false && pnpm build:mobile
      - name: Capacitor sync
        working-directory: mobile
        run: |
          pnpm install --frozen-lockfile=false
          npx cap add android || echo 'android already added'
          npx cap sync android
      # Persist the Android debug keystore across runs so every debug APK is signed
      # with the SAME key. Without this, Gradle generates a fresh random debug key
      # per runner and Android refuses to install an update over a differently-signed
      # build ("App not installed"), breaking the companion's in-app "Check for
      # updates". A stable key → updates install in place. (Debug keys are not
      # secret; the cache just avoids re-generating one each build.)
      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1
      - name: Assemble debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
      # PRD DESK-013 — sign release APK with apksigner when keystore secrets
      # are present. Skipped silently otherwise so PRs from forks still build.
      - name: Assemble release APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon
      - name: Sign release APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
          BUILD_TOOLS=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -n1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          shopt -s nullglob
          for apk in mobile/android/app/build/outputs/apk/release/*-unsigned.apk \
                     mobile/android/app/build/outputs/apk/release/*.apk; do
            signed="${apk%.apk}-signed.apk"
            "$APKSIGNER" sign \
              --ks "$KEYSTORE" \
              --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass "pass:${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}" \
              --out "$signed" "$apk"
            "$APKSIGNER" verify "$signed"
          done
          rm -f "$KEYSTORE"
      - uses: actions/upload-artifact@v4
        with:
          name: radiopad-android-debug
          path: mobile/android/app/build/outputs/apk/debug/*.apk
      - name: Upload signed release APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: radiopad-android-release
          path: mobile/android/app/build/outputs/apk/release/*-signed.apk
          if-no-files-found: warn

  ios:
    # iOS native build only works on macOS (Xcode / xcodebuild). Apple Developer
    # signing material must be provided as secrets.APPLE_CERTIFICATES_P12,
    # APPLE_CERTIFICATES_P12_PASSWORD, APPLE_PROVISIONING_PROFILE,
    # APPLE_TEAM_ID. Without those the job uploads an unsigned .xcarchive.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: '9' }
      - name: Build frontend (mobile companion surface)
        run: |
          pnpm install --frozen-lockfile=false
          # Mobile ships the `mobile` surface only (companion: pairing + dictation),
          # which Capacitor consumes from frontend/out-mobile (see capacitor.config.ts).
          cd frontend && pnpm install --frozen-lockfile=false && pnpm build:mobile
      - name: Capacitor sync
        working-directory: mobile
        run: |
          pnpm install --frozen-lockfile=false
          sudo gem install cocoapods --no-document || true
          npx cap add ios || echo 'ios already added'
          npx cap sync ios
      - name: Archive (unsigned)
        working-directory: mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
      - uses: actions/upload-artifact@v4
        with:
          name: radiopad-ios-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
